<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Rowing — Results</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #23273a;
      --border: #2e3347;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --gold: #f59e0b;
      --silver: #94a3b8;
      --bronze: #cd7c3c;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --green: #10b981;
      --red: #ef4444;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* ── Header refondu (responsive) ── */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 20px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 100; min-height: 58px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: inherit; flex-shrink: 0;
    }
    .brand .logo {
      width: 34px; height: 34px; background: var(--accent); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .brand-text h1 { font-size: 1.05rem; font-weight: 600; line-height: 1.2; }
    .brand-text p  { font-size: 0.72rem; color: var(--text-muted); line-height: 1.2; margin-top: 2px; }

    .header-nav { display: flex; gap: 4px; align-items: center; }
    .nav-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 11px; border-radius: var(--radius);
      font-size: 0.82rem; font-weight: 500;
      border: 1px solid var(--border); color: var(--text-muted);
      cursor: pointer; text-decoration: none;
      transition: border-color .15s, color .15s, background .15s;
      white-space: nowrap;
    }
    .nav-link:hover  { border-color: var(--accent); color: var(--accent); }
    .nav-link.active {
      border-color: var(--accent); color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, var(--surface));
    }
    .nav-icon  { font-size: 0.95rem; line-height: 1; }

    .header-tools {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
    }
    .refresh-status {
      font-size: 0.7rem; color: var(--text-muted);
      padding: 0 4px; white-space: nowrap;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .refresh-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted); flex-shrink: 0;
    }
    .refresh-dot.on { background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%     { opacity: .35; }
    }
    .hdr-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 11px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); border-radius: var(--radius);
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
      transition: border-color .15s, color .15s, background .15s;
      white-space: nowrap; font-family: inherit; line-height: 1;
    }
    .hdr-btn:hover { border-color: var(--accent); color: var(--text); }
    .hdr-btn.active {
      border-color: var(--accent); color: var(--accent);
      background: color-mix(in srgb, var(--accent) 15%, var(--surface2));
    }
    .hdr-btn.on {
      border-color: var(--green); color: var(--green);
      background: color-mix(in srgb, var(--green) 12%, var(--surface2));
    }
    .hdr-icon { font-size: 0.95rem; line-height: 1; }

    .hdr-more {
      display: none;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); border-radius: var(--radius);
      padding: 6px 11px; font-size: 1.05rem; cursor: pointer;
      line-height: 1; font-weight: 700; font-family: inherit;
      transition: border-color .15s, color .15s;
    }
    .hdr-more:hover { border-color: var(--accent); color: var(--text); }

    .more-menu {
      display: none; position: fixed; top: 60px; right: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 6px;
      box-shadow: 0 6px 24px rgba(0,0,0,.5);
      min-width: 220px; z-index: 99;
      flex-direction: column; gap: 1px;
    }
    .more-menu.open { display: flex; }
    .more-menu button, .more-menu a {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 10px; background: transparent; border: none;
      color: var(--text); font-size: 0.85rem; font-weight: 500;
      cursor: pointer; border-radius: 5px; text-align: left;
      font-family: inherit; text-decoration: none;
    }
    .more-menu button:hover, .more-menu a:hover { background: var(--surface2); }
    .more-menu .menu-state {
      margin-left: auto; font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em;
      color: var(--text-muted);
    }
    .more-menu button.on .menu-state { color: var(--green); }
    .more-menu .menu-sep { border: none; border-top: 1px solid var(--border); margin: 3px 0; }
    .more-menu .menu-info {
      padding: 5px 10px; font-size: 0.7rem; color: var(--text-muted); line-height: 1.3;
    }

    .layout { display: flex; flex: 1; overflow: hidden; }

    aside {
      width: 270px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border); padding: 20px;
      overflow-y: auto; display: flex; flex-direction: column; gap: 14px;
    }
    .filter-group label {
      display: block; font-size: 0.72rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--text-muted); margin-bottom: 5px;
    }
    .filter-group select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 8px 10px; border-radius: var(--radius);
      font-size: 0.88rem; outline: none;
    }
    .filter-group select:focus { border-color: var(--accent); }

    .btn {
      width: 100%; padding: 9px; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); font-size: 0.88rem;
      font-weight: 600; cursor: pointer; transition: background .15s;
    }
    .btn:hover   { background: var(--accent-hover); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    main {
      flex: 1; overflow-y: auto; padding: 22px;
      display: flex; flex-direction: column; gap: 20px;
    }

    .section-title {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--text-muted);
    }
    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.83rem; color: var(--text-muted); flex-wrap: wrap;
    }
    .breadcrumb a { color: var(--accent); cursor: pointer; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb .sep { color: var(--border); }

    .cards-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 10px;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; cursor: pointer;
      transition: border-color .15s, transform .1s;
    }
    .card:hover  { border-color: var(--accent); transform: translateY(-1px); }
    .card.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--surface)); }
    .card-title  { font-weight: 600; font-size: 0.92rem; margin-bottom: 5px; }
    .card-meta   { font-size: 0.78rem; color: var(--text-muted); display: flex; flex-wrap: wrap; gap: 6px; }

    .badge {
      display: inline-block; padding: 1px 6px; border-radius: 99px;
      font-size: 0.68rem; font-weight: 600;
    }
    .badge-muted { background: var(--surface2); color: var(--text-muted); }

    .race-list { display: flex; flex-direction: column; gap: 5px; }
    .race-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px; cursor: pointer;
      display: flex; align-items: center; gap: 10px; transition: border-color .15s;
    }
    .race-item:hover  { border-color: var(--accent); }
    .race-item.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--surface)); }
    .race-item-name   { flex: 1; font-weight: 500; font-size: 0.88rem; }
    .race-item-meta   { font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }

    .group-label {
      margin: 10px 0 4px; font-size: 0.72rem; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em;
    }

    .tabs {
      display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 14px;
    }
    .tab {
      padding: 7px 14px; font-size: 0.83rem; font-weight: 500;
      cursor: pointer; border-bottom: 2px solid transparent;
      color: var(--text-muted); transition: color .15s, border-color .15s;
    }
    .tab.active      { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }

    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    thead th {
      background: var(--surface2); padding: 9px 13px; text-align: left;
      font-size: 0.71rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text-muted); white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 9px 13px; white-space: nowrap; }

    .rank-1 { font-weight: 700; color: var(--gold); }
    .rank-2 { font-weight: 700; color: var(--silver); }
    .rank-3 { font-weight: 700; color: var(--bronze); }

    .athlete-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .athlete-chip {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 3px 9px; font-size: 0.78rem;
    }
    .athlete-chip strong { color: var(--text); }
    .athlete-chip span   { color: var(--text-muted); margin-left: 4px; }

    .loading {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; padding: 48px; color: var(--text-muted);
    }
    .spinner {
      width: 30px; height: 30px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { padding: 40px; text-align: center; color: var(--text-muted); font-size: 0.88rem; }
    .error-box {
      background: color-mix(in srgb, var(--red) 12%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--red) 40%, transparent);
      border-radius: var(--radius); padding: 14px; color: #fca5a5; font-size: 0.84rem;
    }
    .scroll-hint { font-size: 0.72rem; color: var(--text-muted); text-align: right; margin-bottom: 4px; }

    hr { border: none; border-top: 1px solid var(--border); }

    code {
      background: var(--surface2); padding: 2px 5px;
      border-radius: 4px; font-size: 0.8rem;
    }

    /* ── Boat-class filter pills ── */
    .class-filters {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 12px 0 4px;
    }
    .pill {
      padding: 4px 12px; border-radius: 99px; font-size: 0.78rem; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text-muted);
      transition: border-color .15s, color .15s, background .15s;
      white-space: nowrap;
    }
    .pill:hover  { border-color: var(--accent); color: var(--accent); }
    .pill.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 18%, var(--surface2)); color: var(--accent); font-weight: 600; }

    /* ── Compare mode ── */
    .cmp-layout { display: none; flex: 1; overflow: hidden; }
    .cmp-layout.open { display: flex; }

    .cmp-selector {
      width: 260px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border); padding: 18px;
      overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
    }
    .cmp-selector.slot-b { border-right: none; border-left: 1px solid var(--border); }
    .cmp-label {
      display: inline-block; padding: 3px 10px; border-radius: 99px;
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
    }
    .cmp-label-a { background: color-mix(in srgb, var(--accent) 20%, var(--surface2)); color: var(--accent); }
    .cmp-label-b { background: color-mix(in srgb, var(--green)  20%, var(--surface2)); color: var(--green); }
    .cmp-comp-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 9px 12px; cursor: pointer;
      font-size: 0.84rem; transition: border-color .15s;
    }
    .cmp-comp-card:hover  { border-color: var(--accent); }
    .cmp-comp-card.active-a { border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, var(--surface2)); }
    .cmp-comp-card.active-b { border-color: var(--green);
      background: color-mix(in srgb, var(--green)  10%, var(--surface2)); }

    .cmp-diff { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    .diff-class-block {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .diff-class-header {
      background: var(--surface2); padding: 7px 14px;
      font-size: 0.74rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .05em; color: var(--text-muted); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .diff-country-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 7px 14px; border-bottom: 1px solid var(--border); font-size: 0.83rem;
    }
    .diff-country-row:last-child { border-bottom: none; }
    .diff-flag { width: 90px; flex-shrink: 0; font-weight: 600; color: var(--text); }
    .diff-flag small { display: block; font-weight: 400; font-size: 0.72rem; color: var(--text-muted); }
    .diff-athletes { flex: 1; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .diff-ath {
      padding: 2px 8px; border-radius: 99px; font-size: 0.75rem; white-space: nowrap;
    }
    .diff-ath.added   { background: color-mix(in srgb, var(--green) 16%, var(--surface2));
                        color: var(--green); border: 1px solid color-mix(in srgb, var(--green) 35%, transparent); }
    .diff-ath.removed { background: color-mix(in srgb, var(--red)   16%, var(--surface2));
                        color: var(--red);   border: 1px solid color-mix(in srgb, var(--red)   35%, transparent); }
    .diff-ath.same    { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

    .nation-delta-pos  { color: var(--green); font-weight: 700; }
    .nation-delta-neg  { color: var(--red);   font-weight: 700; }
    .nation-delta-zero { color: var(--text-muted); }

    /* ── Compare : doublons intra-compétition (Par bateau) ── */
    .dup-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 10px;
    }
    .dup-col {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 8px 10px;
      display: flex; flex-direction: column; gap: 3px;
    }
    .dup-col-title {
      font-weight: 700; font-size: 0.85rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 5px; margin-bottom: 3px;
    }
    .dup-ath {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.78rem; padding: 2px 0;
    }
    .dup-pos {
      min-width: 20px; text-align: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 3px; font-size: 0.7rem;
      font-weight: 700; color: var(--text-muted);
      padding: 1px 4px; flex-shrink: 0;
    }
    .dup-ath.common { color: var(--gold); font-weight: 600; }
    .dup-ath.common .dup-pos {
      color: var(--gold);
      border-color: color-mix(in srgb, var(--gold) 50%, transparent);
    }
    .dup-block-title {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 8px 14px; border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface2) 70%, transparent);
    }
    .dup-block-title .name { font-weight: 700; }
    .dup-block-title .meta { font-size: 0.75rem; color: var(--text-muted); }

    /* ── Nation cards ── */
    .nation-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .nation-card-header {
      display: flex; align-items: stretch; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .nation-card-name {
      padding: 10px 16px; font-weight: 700; font-size: 0.95rem;
      min-width: 140px; display: flex; align-items: center;
      border-right: 1px solid var(--border);
    }
    .nation-card-stats {
      display: flex; align-items: stretch; flex: 1; flex-wrap: wrap;
    }
    .nation-stat {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 8px 16px; gap: 2px;
      border-right: 1px solid var(--border); min-width: 80px;
    }
    .nation-stat:last-child { border-right: none; }
    .nation-stat-val  { font-size: 1.15rem; font-weight: 700; line-height: 1; }
    .nation-stat-lbl  { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }
    .nation-stat.total .nation-stat-val  { color: var(--text); }
    .nation-stat.total .nation-stat-sub  { font-size: 0.65rem; color: var(--text-muted); }
    .nation-stat.removed .nation-stat-val { color: var(--red); }
    .nation-stat.same    .nation-stat-val { color: var(--text-muted); }
    .nation-stat.added   .nation-stat-val { color: var(--green); }
    .nation-card-body {
      padding: 8px 14px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
    }
    .nation-card-body:empty { display: none; }
    .nation-card.no-change .nation-card-header { opacity: .6; }

    @media (max-width: 860px) {
      .cmp-layout.open { flex-direction: column; }
      .cmp-selector { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
      .cmp-selector.slot-b { border-left: none; }
    }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.65); backdrop-filter: blur(3px);
      z-index: 200; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; width: 100%; max-width: 820px;
      max-height: 88vh; display: flex; flex-direction: column;
      box-shadow: 0 24px 60px rgba(0,0,0,.6);
      animation: modalIn .18s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(16px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }

    .modal-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 18px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-title   { font-weight: 700; font-size: 1rem; margin-bottom: 3px; }
    .modal-sub     { font-size: 0.78rem; color: var(--text-muted); }
    .modal-close {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 6px; width: 30px; height: 30px;
      font-size: 1rem; cursor: pointer; flex-shrink: 0; margin-left: 12px;
      display: flex; align-items: center; justify-content: center; line-height: 1;
      transition: border-color .15s, color .15s;
    }
    .modal-close:hover { border-color: var(--accent); color: var(--text); }

    .modal-body { overflow-y: auto; padding: 18px 20px; flex: 1; }

    /* ── Header responsive ── */
    @media (max-width: 920px) {
      .brand-text p { display: none; }
      .brand-text h1 { font-size: 0.95rem; }
      .nav-link { padding: 6px 9px; }
    }
    @media (max-width: 760px) {
      header { padding: 9px 12px; gap: 8px; }
      .brand-text { display: none; }
      .nav-label, .hdr-lbl { display: none; }
      .refresh-status .lbl-text { display: none; }
      .hdr-btn { padding: 6px 9px; }
      .nav-link { padding: 6px 9px; }
    }
    @media (max-width: 560px) {
      .hdr-btn#btn-compare,
      .hdr-btn#btn-notif,
      .refresh-status { display: none; }
      .hdr-more { display: inline-flex; align-items: center; justify-content: center; }
    }

    @media (max-width: 720px) {
      .layout { flex-direction: column; }
      aside { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
      .cards-grid { grid-template-columns: 1fr; }
      .modal-panel { max-height: 95vh; }
    }

    /* ── Collapsible nation panel ── */
    .collapsible-panel { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-top: 8px; }
    .collapsible-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--surface2); border: none; color: var(--text-muted); font-size: 0.78rem; font-weight: 600; cursor: pointer; text-align: left; transition: background .15s, color .15s; }
    .collapsible-toggle:hover { background: color-mix(in srgb, var(--accent) 10%, var(--surface2)); color: var(--text); }
    .collapsible-toggle.open { color: var(--accent); }
    .collapsible-toggle .chevron { font-size: 0.62rem; transition: transform .2s; flex-shrink: 0; }
    .collapsible-toggle.open .chevron { transform: rotate(90deg); }
    .collapsible-body { display: none; padding: 10px 12px; border-top: 1px solid var(--border); }
    .collapsible-body.open { display: block; }
    .nation-search { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 9px; border-radius: var(--radius); font-size: 0.8rem; outline: none; margin-bottom: 7px; }
    .nation-search:focus { border-color: var(--accent); }

    /* ── Favoris nations ── */
    .fav-section {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 8px 10px;
      margin-bottom: 8px; display: flex; flex-direction: column; gap: 6px;
    }
    .fav-current {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      font-size: 0.78rem; color: var(--text-muted);
    }
    .fav-current .star { color: var(--gold); font-size: 0.95rem; }
    .fav-current .nation-name {
      color: var(--gold); font-weight: 700; cursor: pointer; padding: 1px 6px;
      border-radius: 4px; transition: background .15s;
    }
    .fav-current .nation-name:hover { background: color-mix(in srgb, var(--gold) 18%, transparent); }
    .fav-clear {
      cursor: pointer; color: var(--text-muted); font-size: 0.85rem;
      padding: 0 4px; border-radius: 3px; transition: color .15s, background .15s;
    }
    .fav-clear:hover { color: var(--red); background: var(--surface); }
    .fav-recents {
      display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
      font-size: 0.75rem; color: var(--text-muted);
    }
    .recent-chip {
      cursor: pointer; padding: 2px 8px; border-radius: 99px;
      background: var(--surface); border: 1px solid var(--border);
      font-size: 0.74rem; color: var(--text);
      transition: border-color .15s, color .15s;
    }
    .recent-chip:hover { border-color: var(--accent); color: var(--accent); }
    .nation-pill { display: inline-flex; align-items: center; gap: 4px; }
    .fav-star {
      cursor: pointer; opacity: .35; font-size: 0.85rem; line-height: 1;
      transition: opacity .15s, color .15s;
    }
    .fav-star:hover     { opacity: 1; color: var(--gold); }
    .fav-star.is-fav    { opacity: 1; color: var(--gold); }

    /* ── Inline race detail accordion ── */
    .race-item.open {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 8%, var(--surface));
      border-bottom-left-radius: 0; border-bottom-right-radius: 0;
      border-bottom-color: transparent;
    }
    .race-detail-panel {
      background: var(--surface); border: 1px solid var(--accent);
      border-top: none; border-bottom-left-radius: var(--radius);
      border-bottom-right-radius: var(--radius);
      padding: 16px 18px; margin-bottom: 4px;
    }
    .race-chevron { font-size: 0.6rem; color: var(--text-muted); transition: transform .2s; flex-shrink: 0; margin-left: 6px; }
    .race-item.open .race-chevron { transform: rotate(180deg); color: var(--accent); }

    /* ── Light mode ── */
    body.light {
      --bg: #f1f5f9; --surface: #ffffff; --surface2: #f8fafc;
      --border: #e2e8f0; --text: #1e293b; --text-muted: #64748b;
      --accent: #2563eb; --accent-hover: #1d4ed8;
    }

    /* ── Toast notifications ── */
    .toast-container {
      position: fixed; bottom: 16px; right: 16px; z-index: 300;
      display: flex; flex-direction: column-reverse; gap: 8px;
      max-width: calc(100vw - 32px); pointer-events: none;
    }
    .toast {
      background: var(--surface); border: 1px solid var(--accent);
      border-left: 4px solid var(--accent); border-radius: var(--radius);
      padding: 12px 14px; box-shadow: 0 8px 24px rgba(0,0,0,.4);
      width: 320px; max-width: 100%;
      animation: toastIn .25s ease;
      pointer-events: auto;
      display: flex; gap: 10px; align-items: flex-start;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: none; }
    }
    .toast.fade-out { animation: toastOut .3s ease forwards; }
    @keyframes toastOut {
      to { opacity: 0; transform: translateX(20px); }
    }
    .toast-icon { font-size: 1.2rem; flex-shrink: 0; line-height: 1; }
    .toast-body { flex: 1; min-width: 0; }
    .toast-title { font-weight: 700; font-size: 0.88rem; margin-bottom: 3px; }
    .toast-text  { font-size: 0.78rem; color: var(--text-muted); line-height: 1.4; }
    .toast-close {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 0 4px; font-size: 1rem; line-height: 1;
      flex-shrink: 0;
    }
    .toast-close:hover { color: var(--text); }
  </style>
</head>

// ── URL / fetch ───────────────────────────────────────────────────────────
function buildUrl(path, params) {
  const parts = [];
  for (const [k, v] of Object.entries(params)) {
    if (v == null) continue;
    parts.push(encodeURIComponent(k) + "=" + encodeURIComponent(v));
  }
  return getBase() + path + (parts.length ? "?" + parts.join("&") : "");
}

async function apiFetch(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── API ───────────────────────────────────────────────────────────────────
async function apiCompetitions(year, category) {
  const url = buildUrl("/competition", {
    "filter[StartDate]": `${year}-12-31T23:59:59.000Z`,
    "filter[competitionType.competitionCategory.DisplayName]": category,
    "filterOptions[StartDate]": "lessThanEqualTo",
    "include": "competitionType,competitionType.competitionCategory,venue,venue.country",
    "sort[StartDate]": "desc",
  });
  const payload = await apiFetch(url);
  const data = Array.isArray(payload.data) ? payload.data : [];
  return data.filter(c => String(c.StartDate || "").startsWith(String(year)));
}

async function apiRaces(competitionId) {
  const url = buildUrl("/race/", {
    "include": "raceStatus,racePhase,event.competition.competitionType,event.competition.competitionType.competitionCategory,event.boatClass,raceBoats",
    "filter[event.competitionId]": competitionId,
    "sort[date]": "asc",
  });
  const payload = await apiFetch(url);
  const data = Array.isArray(payload.data) ? payload.data : [];
  return data.filter(r => {
    const s = r.raceStatus;
    return (typeof s === "object" ? s?.DisplayName : s) === "Official";
  });
}

// ── Fmt : "il y a Xs / X min" ─────────────────────────────────────────────
function fmtRelative(ts) {
  if (!ts) return "—";
  const sec = Math.max(0, Math.floor((Date.now() - ts) / 1000));
  if (sec < 60)   return t("ago_sec",  { n: sec });
  if (sec < 3600) return t("ago_min",  { n: Math.floor(sec/60) });
  return            t("ago_hour", { n: Math.floor(sec/3600) });
}

// ── Notifications toggle ──────────────────────────────────────────────────
function toggleNotifications() {
  if (!N.on) {
    if (!("Notification" in window)) {
      alert(t("notif_no_browser"));
      return;
    }
    if (Notification.permission === "default") {
      Notification.requestPermission().then(p => {
        if (p === "granted" || p === "denied") {
          N.on = true;
          localStorage.setItem("wr-notif-enabled", "on");
          document.getElementById("btn-notif").classList.toggle("on", true);
          startNotificationLoop();
        }
      });
      return;
    }
    N.on = true;
    localStorage.setItem("wr-notif-enabled", "on");
    document.getElementById("btn-notif").classList.toggle("on", true);
    startNotificationLoop();
  } else {
    N.on = false;
    localStorage.setItem("wr-notif-enabled", "off");
    document.getElementById("btn-notif").classList.toggle("on", false);
    stopNotificationLoop();
  }
}

async function refreshAll() {
  if (!S.selectedComp) {
    R.lastRefreshAt = Date.now();
    updateRefreshStatus();
    return;
  }
  const cId = S.selectedComp.id;
  try {
    // Liste des courses (silencieux, sans spinner)

      if (S.selectedComp?.id === cId) S.entries = entries;
    }

function getNotifShownKey() {
  return `wr-notif-shown-${new Date().toISOString().slice(0,10)}`;
}
function loadShownToday() {
  try { return new Set(JSON.parse(localStorage.getItem(getNotifShownKey()) || "[]")); }
  catch { return new Set(); }
}
function saveShownToday(set) {
  localStorage.setItem(getNotifShownKey(), JSON.stringify([...set]));
}

// Affiche un toast in-app (auto-dismiss après 8s)
function showToast(title, text) {
  const container = document.getElementById("toast-container");
  if (!container) return;
  const el = document.createElement("div");
  el.className = "toast";
  el.innerHTML = `
    <span class="toast-icon">🔔</span>
    <div class="toast-body">
      <div class="toast-title"></div>
      <div class="toast-text"></div>
    </div>
    <button class="toast-close" aria-label="Fermer">✕</button>`;
  el.querySelector(".toast-title").textContent = title;
  el.querySelector(".toast-text").textContent  = text;
  el.querySelector(".toast-close").addEventListener("click", () => removeToast(el));
  container.appendChild(el);
  setTimeout(() => removeToast(el), 8000);
}
function removeToast(el) {
  if (!el || !el.isConnected) return;
  el.classList.add("fade-out");
  setTimeout(() => el.remove(), 300);
}

// Notification système (si permission)
function sendBrowserNotif(title, body) {
  if (!("Notification" in window)) return;
  if (Notification.permission !== "granted") return;
  try { new Notification(title, { body, tag: title.slice(0,20) }); }
  catch(e) { /* ignore */ }
}

// Vérifie s'il y a des courses à venir dans 5 min pour la nation favorite
async function checkUpcomingRaces() {
  if (!N.on) return;
  const fav = getFavNation();
  if (!fav) return;
  if (!S.selectedComp) return;

  // Charger les courses (toutes, pas seulement officielles)
  let races = N.allRaces || [];
  if (!races.length) {
    try { races = await apiAllRaces(S.selectedComp.id); N.allRaces = races; }
    catch(e) { console.warn("[notif]", e); return; }
  }
  if (!races.length) return;

  // Résoudre nom complet → code pays via les engagés (si chargés)
  let code = fav;
  if (S.entries && S.entries.length) {
    const resolved = nationCodeFromEntries(fav);
    if (resolved) code = resolved;
  }

  N.shownToday = loadShownToday();
  const now = Date.now();
  for (const race of races) {
    const rid = String(race.id);
    if (N.shownToday.has(rid)) continue;
    if (!race.DateString) continue;
    const t = new Date(race.DateString).getTime();
    if (isNaN(t)) continue;
    const sec = (t - now) / 1000;
    if (sec <= 0 || sec > 300) continue; // hors fenêtre 0-5 min

    const inRace = (race.raceBoats || []).some(b => b.DisplayName === code);
    if (!inRace) continue;

    notifyRace(race, fav);
    N.shownToday.add(rid);
  }
  saveShownToday(N.shownToday);
}

function notifyRace(race, nation) {
  const className = race.event?.boatClass?.DisplayName || "";
  const phase     = race.racePhase?.DisplayName || "";
  const locale    = getLang() === "fr" ? "fr-FR" : "en-GB";
  const time      = (() => {
    try { return new Date(race.DateString).toLocaleTimeString(locale, {hour:"2-digit",minute:"2-digit"}); }
    catch { return ""; }
  })();
  const title = t("notif_title", { nation });
  const body  = [race.DisplayName, className, phase, time].filter(Boolean).join(" · ");
  showToast(title, body);
  sendBrowserNotif(title, body);
}

function startNotificationLoop() {
  if (N.intervalId) clearInterval(N.intervalId);
  N.shownToday = loadShownToday();
  N.allRaces   = null; // force re-fetch au premier check
  // Premier check rapide, puis toutes les 30s
  setTimeout(checkUpcomingRaces, 1500);
  N.intervalId = setInterval(checkUpcomingRaces, 30000);
}

  if (N.intervalId) { clearInterval(N.intervalId); N.intervalId = null; }

// ── Compare: diff computation ─────────────────────────────────────────────
function flattenEntries(events) {
  // Map<className → Map<countryName → Map<personId → {name, position}>>>
  const result = new Map();
  for (const evt of (events || [])) {
    const cls = evt.boatClass?.DisplayName || "Autre";
    if (!result.has(cls)) result.set(cls, new Map());
    const byCountry = result.get(cls);
    for (const boat of (evt.boats || [])) {
      const country = boat.country?.DisplayName || boat.DisplayName || "—";
      if (!byCountry.has(country)) byCountry.set(country, new Map());
      const athletes = byCountry.get(country);
      for (const ba of (boat.boatAthletes || [])) {
        const p = ba.person || {};
        const name = [p.FirstName, p.LastName].filter(Boolean).join(" ") || p.DisplayName || "?";
        const position = ba.boatPosition != null ? String(ba.boatPosition) : "";
        athletes.set(String(ba.personId), { name, position });
      }
    }
  }
  return result;
}

function buildDiff(entriesA, entriesB) {
  const mapA = flattenEntries(entriesA);
  const mapB = flattenEntries(entriesB);
  const classSet = new Set([...mapA.keys(), ...mapB.keys()]);
  const classes  = sortClasses([...classSet]);
  const byClass  = {};

  // Trier les athlètes par poste : C, S, [N décroissants], B
  const sortByPos = (a, b) => {
    const ra = positionRank(a.position), rb = positionRank(b.position);
    return ra - rb || (a.name || "").localeCompare(b.name || "");
  };

  for (const cls of classes) {
    const cA = mapA.get(cls) || new Map();
    const cB = mapB.get(cls) || new Map();
    const countries = [...new Set([...cA.keys(), ...cB.keys()])].sort();
    const byCountry = {};

    for (const country of countries) {
      const athA = cA.get(country) || new Map();  // personId → {name, position}
      const athB = cB.get(country) || new Map();
      const added = [], removed = [], same = [];

      for (const [id, info] of athB) {
        const prev = athA.get(id);
        if (!prev) added.push({ id, ...info });
        else       same.push({ id, ...info, prevPosition: prev.position });
      }

      for (const [id, info] of athA)
        if (!athB.has(id)) removed.push({ id, ...info });

      added.sort(sortByPos);
      removed.sort(sortByPos);
      same.sort(sortByPos);

      byCountry[country] = { added, removed, same };
    }
    byClass[cls] = { countries, byCountry };
  }
  return { classes, byClass };
}

// ── Compare: diff renderers ───────────────────────────────────────────────
// Affiche "Nom (poste)" si le poste est connu. Pour un athlète "same" qui a
// changé de poste entre A et B, affiche "Nom (oldPos→newPos)".
function athleteLabel(a, kind) {
  const pos = a.position ? esc(a.position) : "";
  if (kind === "same" && a.prevPosition && a.prevPosition !== a.position) {
    return `${esc(a.name)} <small style="opacity:.75;">(${esc(a.prevPosition)}→${pos || "?"})</small>`;
  }
  return pos ? `${esc(a.name)} <small style="opacity:.75;">(${pos})</small>` : esc(a.name);
}

function diffEventsHtml(diff) {
  const classes = C.classFilter ? [C.classFilter] : diff.classes;
  let html = "";

  for (const cls of classes) {
    const group = diff.byClass[cls];
    if (!group) continue;

    // count total changes for header badge
    let totalAdded = 0, totalRemoved = 0;
    for (const c of group.countries) {
      const d = group.byCountry[c];
      if (C.nationFilter && c !== C.nationFilter) continue;
      totalAdded   += d.added.length;
      totalRemoved += d.removed.length;
    }

    const badge = (totalAdded || totalRemoved)
      ? `<span class="diff-ath added" style="margin-left:auto;">+${totalAdded}</span>
         <span class="diff-ath removed">−${totalRemoved}</span>`
      : `<span style="color:var(--green);font-size:0.75rem;margin-left:auto;">${t("cmp_no_change")}</span>`;

    html += `<div class="diff-class-block">
      <div class="diff-class-header">${esc(cls)} ${badge}</div>`;

    for (const country of group.countries) {
      if (C.nationFilter && country !== C.nationFilter) continue;
      const { added, removed, same } = group.byCountry[country];
      const allAthletes = [
        ...removed.map(a => `<span class="diff-ath removed">− ${athleteLabel(a, "removed")}</span>`),
        ...same.map(a    => `<span class="diff-ath same">= ${athleteLabel(a, "same")}</span>`),
        ...added.map(a   => `<span class="diff-ath added">+ ${athleteLabel(a, "added")}</span>`),
      ].join("");

      html += `<div class="diff-country-row">
        <div class="diff-flag">${esc(country)}</div>
        <div class="diff-athletes">${allAthletes || '<span style="color:var(--text-muted);font-size:0.75rem;">—</span>'}</div>
      </div>`;
    }
    html += `</div>`;
  }

  return html || `<div class="empty">${t("cmp_no_data")}</div>`;
}

// buildNationDiff — compare les PERSONNES par nation, tous bateaux confondus.
// Un athlète qui change de bateau entre A et B reste "inchangé".
function buildNationDiff(entriesA, entriesB) {
  function flatByNation(events) {
    const map = new Map(); // countryName → Map<personId, name>
    for (const evt of (events || [])) {
      const cls = evt.boatClass?.DisplayName || "Autre";
      if (C.classFilter && cls !== C.classFilter) continue;
      for (const boat of (evt.boats || [])) {
        const country = boat.country?.DisplayName || boat.DisplayName || "—";
        if (!map.has(country)) map.set(country, new Map());
        const athletes = map.get(country);
        for (const ba of (boat.boatAthletes || [])) {
          const p = ba.person || {};
          const name = [p.FirstName, p.LastName].filter(Boolean).join(" ") || p.DisplayName || "?";
          athletes.set(String(ba.personId), name);
        }
      }
    }
    return map;
  }

  const mapA = flatByNation(entriesA);
  const mapB = flatByNation(entriesB);
  const countries = [...new Set([...mapA.keys(), ...mapB.keys()])].sort();

  let totalAdded = 0, totalRemoved = 0, totalSame = 0;
  const nations = {};

  for (const country of countries) {
    const athA = mapA.get(country) || new Map();
    const athB = mapB.get(country) || new Map();
    const added = [], removed = [], same = [];

    for (const [id, name] of athB)
      athA.has(id) ? same.push({ id, name }) : added.push({ id, name });

    for (const [id, name] of athA)
      if (!athB.has(id)) removed.push({ id, name });

    nations[country] = { added, removed, same };
    totalAdded   += added.length;
    totalRemoved += removed.length;
    totalSame    += same.length;
  }

  return { nations, countries, totalAdded, totalRemoved, totalSame };
}

function diffNationsHtml() {
  const nd = buildNationDiff(C.a.entries, C.b.entries);

  // Résumé global en haut
  const totalB = nd.totalSame + nd.totalAdded;
  const summary = `

                  display:flex;flex-direction:column;justify-content:center;gap:2px;">
        <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);">${t("cmp_total_persons")}</div>
        <div style="font-size:1.5rem;font-weight:700;color:var(--text);line-height:1;">${totalB}</div>
        <div style="font-size:0.72rem;color:var(--text-muted);">${t("cmp_total_sub")}</div>
      </div>
      <!-- Détail -->
      <div style="padding:12px 18px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
          <span style="font-size:1.2rem;font-weight:700;" class="nation-delta-neg">−${nd.totalRemoved}</span>
          <span style="font-size:0.72rem;color:var(--text-muted);">${t("cmp_removed")}</span>
        </div>
        <div style="width:1px;height:32px;background:var(--border);"></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
          <span style="font-size:1.2rem;font-weight:700;color:var(--text-muted);">${nd.totalSame}</span>
          <span style="font-size:0.72rem;color:var(--text-muted);">${t("cmp_unchanged")}</span>
        </div>
        <div style="width:1px;height:32px;background:var(--border);"></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
          <span style="font-size:1.2rem;font-weight:700;" class="nation-delta-pos">+${nd.totalAdded}</span>
          <span style="font-size:0.72rem;color:var(--text-muted);">${t("cmp_added")}</span>
        </div>
      </div>
    </div>`;

  // Appliquer le filtre nation
  const toShow = nd.countries.filter(c =>
    !C.nationFilter || c === C.nationFilter
  );

  // Trier : nations avec changements d'abord, puis alphabétique
  const sorted = [...toShow].sort((a, b) => {
    const da = nd.nations[a].added.length + nd.nations[a].removed.length;
    const db = nd.nations[b].added.length + nd.nations[b].removed.length;
    return db !== da ? db - da : a.localeCompare(b);
  });

  if (!sorted.length) return summary + `<div class="empty">${t("cmp_no_nation")}</div>`;

  let cards = "";
  for (const country of sorted) {
    const st      = nd.nations[country];
    const totalN  = st.same.length + st.added.length;
    const delta   = st.added.length - st.removed.length;
    const dCls    = delta > 0 ? "nation-delta-pos" : delta < 0 ? "nation-delta-neg" : "nation-delta-zero";
    const dStr    = delta > 0 ? `+${delta}` : String(delta);
    const noChg   = !st.added.length && !st.removed.length ? "no-change" : "";

    const athletes = [
      ...st.removed.map(a => `<span class="diff-ath removed">− ${esc(a.name)}</span>`),
      ...st.same.map(a    => `<span class="diff-ath same">= ${esc(a.name)}</span>`),
      ...st.added.map(a   => `<span class="diff-ath added">+ ${esc(a.name)}</span>`),
    ].join("");

    cards += `
      <div class="nation-card ${noChg}">
        <div class="nation-card-header">
          <div class="nation-card-name">${esc(country)}</div>
          <div class="nation-card-stats">
            <div class="nation-stat total">
              <div class="nation-stat-val">${totalN}</div>
              <div class="nation-stat-lbl">${t("cmp_total")}</div>
              <div class="nation-stat-sub">${t("cmp_total_short")}</div>
            </div>
            <div class="nation-stat removed">
              <div class="nation-stat-val">−${st.removed.length}</div>
              <div class="nation-stat-lbl">${t("cmp_removed")}</div>
            </div>
            <div class="nation-stat same">
              <div class="nation-stat-val">${st.same.length}</div>
              <div class="nation-stat-lbl">${t("cmp_unchanged")}</div>
            </div>
            <div class="nation-stat added">
              <div class="nation-stat-val">+${st.added.length}</div>
              <div class="nation-stat-lbl">${t("cmp_added")}</div>
            </div>
            <div class="nation-stat" style="min-width:60px;">
              <div class="nation-stat-val ${dCls}">${dStr}</div>
              <div class="nation-stat-lbl">${t("cmp_delta")}</div>
            </div>
          </div>
        </div>
        ${athletes ? `<div class="nation-card-body">${athletes}</div>` : ""}
      </div>`;
  }

  return summary + `<div style="display:flex;flex-direction:column;gap:8px;">${cards}</div>`;
}

// ── Compare: doublons (>= 2 bateaux pour une nation dans la même classe) ─
function findDuplicateBoats(events) {
  const byClass = new Map();
  for (const evt of (events || [])) {
    const cls = evt.boatClass?.DisplayName || "Autre";
    if (!byClass.has(cls)) byClass.set(cls, new Map());
    const byCountry = byClass.get(cls);
    for (const boat of (evt.boats || [])) {
      const country = boat.country?.DisplayName || boat.DisplayName || "—";
      if (!byCountry.has(country)) byCountry.set(country, []);
      byCountry.get(country).push(boat);
    }
  }
  const result = [];
  for (const [cls, byCountry] of byClass) {
    for (const [country, boats] of byCountry) {
      if (boats.length >= 2) result.push({ cls, country, boats });
    }
  }
  result.sort((a, b) => {
    const ka = boatClassSortKey(a.cls), kb = boatClassSortKey(b.cls);
    return ka[0]-kb[0] || ka[1]-kb[1] || ka[2].localeCompare(kb[2])
        || a.country.localeCompare(b.country);
  });
  return result;
}

function renderDupBlock(dup) {
  // Marquer les athlètes communs entre tous les bateaux (par personId)
  const sets = dup.boats.map(boat =>
    new Set((boat.boatAthletes || []).map(ba => String(ba.personId)))
  );
  const commonSet = sets.length
    ? new Set([...sets[0]].filter(id => sets.every(s => s.has(id))))
    : new Set();

  const cols = dup.boats.map(boat => {
    const athletes = sortAthletes(boat.boatAthletes || [], a => a.boatPosition);
    const lines = athletes.map(a => {
      const p = a.person || {};
      const name = [p.FirstName, p.LastName].filter(Boolean).join(" ") || p.DisplayName || "?";
      const pos  = a.boatPosition || "";
      const isCommon = commonSet.has(String(a.personId));
      return `<div class="dup-ath ${isCommon?"common":""}">
        ${pos ? `<span class="dup-pos">${esc(pos)}</span>` : `<span class="dup-pos">·</span>`}
        <span>${esc(name)}</span>
      </div>`;
    }).join("");
    return `<div class="dup-col">
      <div class="dup-col-title">${esc(boat.DisplayName || "—")}</div>
      ${lines || `<span style="color:var(--text-muted);font-size:0.75rem;">—</span>`}
    </div>`;
  }).join("");

  return `<div style="padding:10px 14px;border-bottom:1px solid var(--border);">
    <div class="dup-block-title" style="background:transparent;border:none;padding:0 0 8px 0;">
      <span class="name">${esc(dup.country)}</span>
      <span class="badge badge-muted">${esc(dup.cls)}</span>
      <span class="meta">${t("cmp_dup_meta", { n: dup.boats.length })}</span>
    </div>
    <div class="dup-grid">${cols}</div>
  </div>`;
}

async function cmpSearch(slot) {

// ── Helpers ───────────────────────────────────────────────────────────────
function fmtTime(t) {
  if (!t) return "—";
  return String(t).trim().replace(/^00:/, "");
}
function fmtDate(d) {
  if (!d) return "—";
  try {
    const locale = getLang() === "fr" ? "fr-FR" : "en-GB";
    return new Date(String(d).replace(" ", "T"))
      .toLocaleDateString(locale, { day: "2-digit", month: "short", year: "numeric" });
  } catch { return d; }
}
function fmtDist(raw) {
  if (!raw) return raw;
  const m = String(raw).match(/^d?(\d+)m?$/i);
  return m ? m[1] + " m" : raw;
}
function esc(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function rankClass(r) { return r==1?"rank-1":r==2?"rank-2":r==3?"rank-3":""; }
function rankEmoji(r) { return r==1?"🥇":r==2?"🥈":r==3?"🥉":(r||"—"); }

// ── Tri des classes de bateau : Open → Light → Para → Mix, M → W → Mix ──
function boatClassSortKey(name) {
  const s = String(name || "").trim();
  let cat = 3, gender = 2;
  if (/^PR\d?\s*M/i.test(s))      { cat = 2; gender = 0; }
  else if (/^PR\d?\s*W/i.test(s)) { cat = 2; gender = 1; }
  else if (/^PR/i.test(s))        { cat = 2; gender = 2; }
  else if (/^LM/i.test(s))        { cat = 1; gender = 0; }
  else if (/^LW/i.test(s))        { cat = 1; gender = 1; }
  else if (/^M(?!ix)/i.test(s))   { cat = 0; gender = 0; }
  else if (/^W/i.test(s))         { cat = 0; gender = 1; }
  else if (/^Mix/i.test(s))       { cat = 0; gender = 2; }
  return [cat, gender, s];
}
function sortClasses(arr) {
  return [...arr].sort((a, b) => {
    const ka = boatClassSortKey(a), kb = boatClassSortKey(b);
    return ka[0] - kb[0] || ka[1] - kb[1] || ka[2].localeCompare(kb[2]);
  });
}

// ── Tri des athlètes par poste : C, S, [N décroissants], B ──────────────
function positionRank(pos) {
  const p = String(pos ?? "").trim().toUpperCase();
  if (p === "C" || p.startsWith("COX")) return -1;
  if (p === "S" || p.startsWith("STR")) return 0;
  if (p === "B" || p.startsWith("BOW")) return 999;
  const n = parseInt(p, 10);
  if (!isNaN(n)) return 100 - n;     // 7 → 93, 2 → 98 (décroissant après S)
  return 500;                         // poste inconnu : avant Bow
}
function sortAthletes(arr, getPos) {
  const fn = getPos || (a => a.position ?? a.boatPosition);
  return [...arr].sort((a, b) => positionRank(fn(a)) - positionRank(fn(b)));
}

// Résout le nom complet d'une nation (ex. "Netherlands") en code pays (ex. "NED")
// en cherchant dans les engagés.  Retourne le code, ou la valeur brute en fallback.
function nationCodeFromEntries(fullName) {
  for (const evt of S.entries) {
    for (const boat of (evt.boats || [])) {
      if (boat.country?.DisplayName === fullName) return boat.DisplayName;
    }
  }
  return fullName; // fallback : code direct si pas de nom complet trouvé
}

function renderRaceList() {
  if (S.loadingRaces) {
    return `<div class="loading"><div class="spinner"></div>${t("loading_races")}</div>`;
  }
  if (!S.races.length) {
    return `<div class="empty">${t("no_official")}</div>`;
  }

  const classes = sortClasses([...new Set(S.races.map(r => r.event?.boatClass?.DisplayName || "Autre"))]);
  let html = `<div>
    <div class="section-title" style="margin-bottom:0;">${t("races_count", { n: S.races.length })}</div>`;

  if (classes.length > 1) {
    html += `<div class="class-filters">
      <div class="pill ${!S.classFilter?"active":""}" onclick="setClassFilter(null)">${t("all")}</div>
      ${classes.map(c => `<div class="pill ${S.classFilter===c?"active":""}" onclick="setClassFilter('${esc(c)}')">${esc(c)}</div>`).join("")}
    </div>`;
  }

  // ── Collapsible nation filter panel ──────────────────────────────────────
  const hasEntries = S.entries.length > 0;
  let nationPanelBody = "";
  if (!hasEntries) {
    const linkHtml = `<a style="color:var(--accent);cursor:pointer;" onclick="setCompTab('entries')">${t("tab_entries")}</a>`;
    nationPanelBody = `<div style="font-size:0.78rem;color:var(--text-muted);line-height:1.55;">
      ${t("filter_load_first", { link: linkHtml })}
    </div>`;
  } else {
    // Collect all nations from entries
    const allNations = (() => {
      const ns = new Set();
      for (const evt of S.entries)
        for (const boat of (evt.boats || []))
          ns.add(boat.country?.DisplayName || boat.DisplayName || "—");
      return [...ns].sort();
    })();
    const q = S.raceNationSearch.toLowerCase();
    const filtered = q ? allNations.filter(n => n.toLowerCase().includes(q)) : allNations;

    const fav     = getFavNation();
    const recents = getRecentNations().filter(n => n !== fav).slice(0, 4);

    const favSection = (fav || recents.length) ? `
      <div class="fav-section">
        ${fav ? `
          <div class="fav-current">
            <span class="star">★</span>
            <span style="color:var(--text-muted);">${t("fav_label")}</span>
            <span class="nation-name" onclick="setRaceNation('${esc(fav)}')">${esc(fav)}</span>
            <span class="fav-clear" title="${t("fav_remove")}" onclick="toggleFavNation('${esc(fav)}')">✕</span>
          </div>` : ''}
        ${recents.length ? `
          <div class="fav-recents">
            <span>🕐 ${t("recents_label")}</span>
            ${recents.map(n => `<span class="recent-chip" onclick="setRaceNation('${esc(n)}')">${esc(n)}</span>`).join("")}
          </div>` : ''}
      </div>` : '';

    nationPanelBody = `
      <input class="nation-search" type="text" placeholder="${t("search_nation")}"
             value="${esc(S.raceNationSearch)}"
             oninput="setRaceNationSearch(this.value)"/>
      ${favSection}
      <div class="class-filters" style="padding:0;max-height:200px;overflow-y:auto;gap:5px;">
        <div class="pill ${!S.raceNationFilter?"active":""}" onclick="setRaceNation(null)">${t("all")}</div>
        ${filtered.map(n => {
          const isFav    = fav === n;
          const isActive = S.raceNationFilter === n;
          return `<div class="pill nation-pill ${isActive?"active":""}" onclick="setRaceNation('${esc(n)}')">
            <span class="fav-star ${isFav?"is-fav":""}" title="${isFav?t("fav_remove"):t("fav_add")}"
                  onclick="event.stopPropagation();toggleFavNation('${esc(n)}')">${isFav?"★":"☆"}</span>
            <span>${esc(n)}</span>
          </div>`;
        }).join("")}
      </div>`;
  }

  const toggleLabel = S.raceNationFilter && hasEntries
    ? t("filter_nation_btn_active", { nation: esc(S.raceNationFilter) })
    : t("filter_nation_btn");
  html += `
  <div class="collapsible-panel">
    <button class="collapsible-toggle ${S.raceNationPanelOpen?"open":""}" onclick="toggleRaceNationPanel()">
      <span>${toggleLabel}</span>
      <span class="chevron">▶</span>
    </button>
    <div class="collapsible-body ${S.raceNationPanelOpen?"open":""}">
      ${nationPanelBody}
    </div>
  </div>`;

  // ── Apply nation filter : ne garder que les courses où le pays a
  //    effectivement un bateau dans raceBoats ────────────────────────────
  let racesToShow = S.races;
  if (S.raceNationFilter) {
    // raceBoat.DisplayName = code pays (ex. "NED") — on résout depuis les engagés si dispo
    const code = hasEntries
      ? nationCodeFromEntries(S.raceNationFilter)
      : S.raceNationFilter;
    racesToShow = S.races.filter(r =>
      (r.raceBoats || []).some(b => b.DisplayName === code)
    );
  }

  const groups = {};
  for (const r of racesToShow) {
    const cls = r.event?.boatClass?.DisplayName || "Autre";
    if (S.classFilter && cls !== S.classFilter) continue;
    (groups[cls] = groups[cls] || []).push(r);
  }

  html += `<div class="race-list" style="margin-top:10px;">`;
  if (!Object.keys(groups).length) {
    html += `<div class="empty" style="padding:24px;">${t("no_race_filter")}</div>`;
  } else {
    const sortedGroupKeys = sortClasses(Object.keys(groups));
    for (const cls of sortedGroupKeys) {
      const races = groups[cls];
      if (!S.classFilter) html += `<div class="group-label">${esc(cls)}</div>`;
      for (const r of races) {
        const phase  = (typeof r.racePhase === "object" ? r.racePhase?.DisplayName : r.racePhase) || "—";
        const dt     = fmtDate(r.Date || r.date);
        const isOpen = S.openRaces.has(r.id);
        html += `
          <div class="race-item ${isOpen ? "open" : ""}" id="race-${r.id}" onclick="toggleRaceDetail('${r.id}')">
            <div class="race-item-name">${esc(r.DisplayName || r.id)}</div>
            <div class="race-item-meta">${dt}</div>
            <span class="badge badge-muted">${esc(phase)}</span>
            <span class="race-chevron">▼</span>
          </div>`;
        if (isOpen) {
          html += `<div class="race-detail-panel">${renderRaceDetailInline(r.id)}</div>`;
        }
      }
    }
  }
  return html + `</div></div>`;
}

  if (st.loading) {

  }

    ${esc(fmtDate(race.Date))} · ${t("boats_count", { n: boats.length })}

    <div class="tab ${st.tab==="results"?"active":""}"   onclick="setRaceTab('${sid}','results')">${t("tab_results")}</div>
    <div class="tab ${st.tab==="athletes"?"active":""}"  onclick="setRaceTab('${sid}','athletes')">${t("tab_crews")}</div>
    <div class="tab ${st.tab==="pace"?"active":""}"      onclick="setRaceTab('${sid}','pace')">${t("tab_splits")}</div>
  </div>`;

  const content = st.tab === "results"  ? tabResults(boats)
                : st.tab === "athletes" ? tabAthletes(boats)
                : tabPace(boats);

  return sub + tabs + content;
}

function renderEntriesList() {
  if (S.loadingEntries) {
    return `<div class="loading"><div class="spinner"></div>${t("loading_entries")}</div>`;
  }
  if (!S.entries.length) {
    return `<div class="empty">${t("no_entries")}</div>`;
  }

  // distinct boat classes
  const classes = sortClasses([...new Set(S.entries.map(e => e.boatClass?.DisplayName || "Autre"))]);

  // filter + sort entries by class order (so the table groups events properly)
  const filtered = (S.entryClassFilter
    ? S.entries.filter(e => (e.boatClass?.DisplayName || "Autre") === S.entryClassFilter)
    : [...S.entries]
  ).sort((a, b) => {
    const ka = boatClassSortKey(a.boatClass?.DisplayName || "Autre");
    const kb = boatClassSortKey(b.boatClass?.DisplayName || "Autre");
    return ka[0]-kb[0] || ka[1]-kb[1] || ka[2].localeCompare(kb[2]);
  });

  // total boats
  const totalBoats = filtered.reduce((sum, e) => sum + (e.boats?.length || 0), 0);

  let html = `<div>
    <div class="section-title" style="margin-bottom:0;">${t("entries_count", { ev: filtered.length, bo: totalBoats })}</div>`;

  if (classes.length > 1) {
    html += `<div class="class-filters">
      <div class="pill ${!S.entryClassFilter?"active":""}" onclick="setEntryClassFilter(null)">${t("all")}</div>
      ${classes.map(c => `<div class="pill ${S.entryClassFilter===c?"active":""}" onclick="setEntryClassFilter('${esc(c)}')">${esc(c)}</div>`).join("")}
    </div>`;
  }

  html += `<div class="table-wrap" style="margin-top:10px;"><table>
    <thead><tr>
      <th>${t("hdr_event")}</th>
      <th>${t("hdr_class")}</th>
      <th>${t("hdr_country")}</th>
      <th>${t("hdr_athletes")}</th>
      <th>${t("hdr_final_rank")}</th>
    </tr></thead>
    <tbody>`;

  for (const event of filtered) {
    const evtName = event.DisplayName || "—";
    const cls     = event.boatClass?.DisplayName || "—";
    const boats   = event.boats || [];

    if (!boats.length) {
      html += `<tr>
        <td><strong>${esc(evtName)}</strong></td>
        <td><span class="badge badge-muted">${esc(cls)}</span></td>
        <td colspan="3" style="color:var(--text-muted)">${t("no_boat")}</td>
      </tr>`;
      continue;
    }

    // sort by finalRankIndex if available, else alphabetically
    const sorted = [...boats].sort((a, b) => {
      const ra = a.finalRankIndex ?? 999;
      const rb = b.finalRankIndex ?? 999;
      return ra !== rb ? ra - rb : (a.DisplayName || "").localeCompare(b.DisplayName || "");
    });

    for (let i = 0; i < sorted.length; i++) {
      const b       = sorted[i];
      const country = b.country?.DisplayName || b.DisplayName || "—";
      const flag    = b.DisplayName || "—";  // country code
      const ath     = sortAthletes(b.boatAthletes || [], a => a.boatPosition);
      const names   = ath.map(a => {
        const p = a.person || {};
        const nm = [p.FirstName, p.LastName].filter(Boolean).join(" ") || p.DisplayName || "—";
        return a.boatPosition ? `${a.boatPosition}· ${nm}` : nm;
      }).join(", ");
      const rank = b.finalRank || "—";

      html += `<tr>
        ${i === 0 ? `<td rowspan="${sorted.length}" style="vertical-align:top; font-weight:600; border-right:1px solid var(--border);">${esc(evtName)}<br/><span class="badge badge-muted" style="margin-top:4px;">${esc(cls)}</span></td>` : ""}
        <td><strong>${esc(flag)}</strong> <span style="color:var(--text-muted);font-size:0.8rem;">${esc(country)}</span></td>
        <td style="color:var(--text-muted); font-size:0.82rem;">${esc(names) || "—"}</td>
        <td class="${rankClass(rank)}" style="font-variant-numeric:tabular-nums;">${rankEmoji(rank)}</td>
      </tr>`;
    }
  }

  return html + `</tbody></table></div></div>`;
}

// ── Tab content ───────────────────────────────────────────────────────────
function tabResults(boats) {
  if (!boats.length) return `<div class="empty">${t("no_result")}</div>`;
  const sorted = [...boats].sort((a,b) => (a.Rank||99)-(b.Rank||99));
  let html = `<div class="table-wrap"><table>
    <thead><tr><th>${t("hdr_rank")}</th><th>${t("hdr_lane")}</th><th>${t("hdr_team")}</th><th>${t("hdr_time")}</th><th>${t("hdr_disq")}</th></tr></thead><tbody>`;
  for (const b of sorted) {
    const mark = b.invalidMarkResultCode;
    const markName = mark ? (typeof mark==="object" ? mark.DisplayName : mark) : null;
    html += `<tr>
      <td class="${rankClass(b.Rank)}">${rankEmoji(b.Rank)}</td>
      <td style="color:var(--text-muted)">${esc(b.Lane??"—")}</td>
      <td><strong>${esc(b.DisplayName||b.boatId||"—")}</strong></td>
      <td style="font-variant-numeric:tabular-nums;font-family:monospace;">${esc(fmtTime(b.ResultTime))}</td>
      <td>${markName?`<span class="badge badge-muted">${esc(markName)}</span>`:'<span style="color:var(--green)">✓</span>'}</td>
    </tr>`;

function tabAthletes(boats) {
  if (!boats.length) return `<div class="empty">${t("no_crew")}</div>`;
  const sorted = [...boats].sort((a,b) => (a.Rank||99)-(b.Rank||99));
  let html = `<div class="table-wrap"><table>
    <thead><tr><th>${t("hdr_rank")}</th><th>${t("hdr_team")}</th><th>${t("hdr_athletes")}</th></tr></thead><tbody>`;
  for (const b of sorted) {
    const athletes = sortAthletes(b.raceBoatAthletes || [], a => a.boatPosition);
    const chips = athletes.length
      ? athletes.map(a => {
          const p = a.person || {};
          const name = [p.FirstName, p.LastName].filter(Boolean).join(" ") || p.DisplayName || "—";
          const pos  = a.boatPosition ? ` · ${a.boatPosition}` : "";

        }).join("")
      : `<span style="color:var(--text-muted)">—</span>`;
    html += `<tr>
      <td class="${rankClass(b.Rank)}">${rankEmoji(b.Rank)}</td>
      <td><strong>${esc(b.DisplayName||b.boatId||"—")}</strong></td>
      <td><div class="athlete-list">${chips}</div></td>
    </tr>`;
  }
  return html + `</tbody></table></div>`;
}

// ── Pace helpers ─────────────────────────────────────────────────────────
// Convertit "HH:MM:SS.cc" ou "MM:SS.cc" en secondes
function parseSec(t) {
  if (!t) return null;
  const parts = String(t).trim().split(":");
  if (parts.length === 3) return +parts[0]*3600 + +parts[1]*60 + parseFloat(parts[2]);
  if (parts.length === 2) return +parts[0]*60  + parseFloat(parts[1]);
  return parseFloat(t) || null;
}

// Secondes → "M:SS.cc"
function secToSplit(sec) {
  if (sec == null || isNaN(sec) || sec < 0) return "—";
  const m = Math.floor(sec / 60);
  const s = sec - m * 60;
  return `${m}:${s.toFixed(2).padStart(5, "0")}`;
}

function tabPace(boats) {
  if (!boats.length) return `<div class="empty">${t("no_split")}</div>`;
  const sorted = [...boats].sort((a,b) => (a.Rank||99)-(b.Rank||99));

  // ── Construire la liste des distances triées ───────────────────────────
  const distMap = new Map(); // rawKey → label affiché
  for (const b of sorted)
    for (const i of (b.raceBoatIntermediates||[]))
      if (i.distance?.DisplayName && !distMap.has(i.distance.DisplayName))
        distMap.set(i.distance.DisplayName, fmtDist(i.distance.DisplayName));

  if (!distMap.size) return `<div class="empty">${t("no_split_data")}</div>`;

  const dists = [...distMap.keys()].sort((a,b) =>
    parseInt(a.replace(/\D/g,""),10) - parseInt(b.replace(/\D/g,""),10));

  // ── Index des intermédiaires par bateau ───────────────────────────────
  // boatKey → Map< distKey → intermediate >
  const boatIdx = new Map();
  for (const b of sorted) {
    const key = b.id || b.boatId || b.DisplayName;
    const dm  = new Map();
    for (const i of (b.raceBoatIntermediates||[]))
      if (i.distance?.DisplayName) dm.set(i.distance.DisplayName, i);
    boatIdx.set(key, dm);
  }

  // ── Pré-calcul des stats par distance ─────────────────────────────────
  // Pour chaque distance : temps cumulés, splits, rangs split, leader cumulé
  const stats = {}; // distKey → { cumBySeat, splitBySeat, splitRank, leaderCum }

  for (let di = 0; di < dists.length; di++) {
    const d    = dists[di];
    const prev = di > 0 ? dists[di-1] : null;

    const cumBySeat   = new Map(); // boatKey → secondes cumulées
    const splitBySeat = new Map(); // boatKey → secondes split

    for (const b of sorted) {
      const key   = b.id || b.boatId || b.DisplayName;
      const inter = boatIdx.get(key)?.get(d);
      const cum   = parseSec(inter?.ResultTime);
      cumBySeat.set(key, cum);

      if (prev == null) {
        // premier point : split = cumulé
        splitBySeat.set(key, cum);
      } else {
        const prevInter = boatIdx.get(key)?.get(prev);
        const prevCum   = parseSec(prevInter?.ResultTime);
        splitBySeat.set(key, cum != null && prevCum != null ? cum - prevCum : null);
      }
    }

    // Leader cumulé (= min des temps cumulés valides)
    const validCums = [...cumBySeat.values()].filter(v => v != null);
    const leaderCum = validCums.length ? Math.min(...validCums) : null;

    // Rang dans les splits : trier les splits valides → rang 1 = plus rapide
    const splitEntries = [...splitBySeat.entries()]
      .filter(([,v]) => v != null)
      .sort(([,a],[,b]) => a - b);
    const splitRank = new Map(splitEntries.map(([k], idx) => [k, idx + 1]));

    stats[d] = { cumBySeat, splitBySeat, splitRank, leaderCum };
  }

  // ── Rendu du tableau ──────────────────────────────────────────────────
  const tdBase = `style="font-variant-numeric:tabular-nums;font-family:monospace;
                         vertical-align:top;padding:8px 13px;"`;

  let html = `<div class="scroll-hint">${t("scroll_hint")}</div>
  <div class="table-wrap"><table>
    <thead>
      <tr>
        <th rowspan="2">${t("hdr_rank")}</th>
        <th rowspan="2">${t("hdr_team")}</th>
        ${dists.map(d => `<th colspan="1" style="text-align:center;">${esc(distMap.get(d))}</th>`).join("")}
      </tr>
      <tr>
        ${dists.map(() => `<th style="font-size:0.66rem;color:var(--text-muted);font-weight:500;border-top:1px solid var(--border);">
          ${t("pace_legend")}
        </th>`).join("")}
      </tr>
    </thead>
    <tbody>`;

  for (const b of sorted) {
    const key = b.id || b.boatId || b.DisplayName;

    html += `<tr>
      <td class="${rankClass(b.Rank)}" style="vertical-align:top;">${rankEmoji(b.Rank)}</td>
      <td style="vertical-align:top;"><strong>${esc(b.DisplayName||b.boatId||"—")}</strong></td>`;

    for (const d of dists) {
      const st    = stats[d];
      const inter = boatIdx.get(key)?.get(d);

      if (!inter) { html += `<td style="color:var(--text-muted);vertical-align:top;">—</td>`; continue; }

      const cum      = st.cumBySeat.get(key);
      const split    = st.splitBySeat.get(key);
      const sRank    = st.splitRank.get(key);
      const cumGap   = cum != null && st.leaderCum != null ? cum - st.leaderCum : null;
      const isLeader = cumGap != null && cumGap < 0.005;

      // Ligne 1 : temps cumulé + rang cumulé
      const cumRankStr = inter.Rank
        ? `<small style="color:var(--text-muted);margin-left:2px;">(${inter.Rank})</small>` : "";

      // Ligne 2 : split + rang split + écart cumulé vs leader
      const splitStr  = `<span style="color:var(--text-muted);">${esc(secToSplit(split))}</span>`;
      const sRankStr  = sRank
        ? `<small style="color:var(--text-muted);margin-left:2px;">(${sRank})</small>` : "";
      const gapStr    = isLeader
        ? `<small style="color:var(--green);margin-left:4px;">—</small>`
        : cumGap != null
          ? `<small style="color:var(--red);margin-left:4px;">+${cumGap.toFixed(2)}</small>`
          : "";

      html += `<td ${tdBase}>
        <div>${esc(fmtTime(inter.ResultTime))}${cumRankStr}</div>
        <div style="margin-top:3px;padding-top:3px;border-top:1px solid var(--border);">
          ${splitStr}${sRankStr}${gapStr}
        </div>
      </td>`;
    }

    html += `</tr>`;
  }

  return html + `</tbody></table></div>`;
}

// ── Persistence : compétition sélectionnée (partagée index ↔ schedule) ──
function saveSelectedComp(comp, year, category) {
  if (!comp) { localStorage.removeItem("wr-selected-comp"); return; }
  try {
    localStorage.setItem("wr-selected-comp", JSON.stringify({
      id: comp.id, year: String(year), category: String(category),
    }));
  } catch {}
}
function loadSelectedComp() {
  try {
    const raw = localStorage.getItem("wr-selected-comp");
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
// Compétition en cours aujourd'hui ?
function isOngoingComp(c) {
  const today = new Date().toISOString().slice(0,10);
  const start = String(c.StartDate || "").slice(0,10);
  const end   = String(c.EndDate   || "").slice(0,10);
  return start && end && start <= today && today <= end;
}

// ── Actions ───────────────────────────────────────────────────────────────
async function search() {
  const year = document.getElementById("sel-year").value;
  const cat  = document.getElementById("sel-category").value;
  const btn  = document.getElementById("btn-search");

  S = { competitions: [], loadingComps: true, selectedComp: null,
        compTab: "races",
        races: [], loadingRaces: false, classFilter: null,
        entries: [], loadingEntries: false, entryClassFilter: null,
        raceNationPanelOpen: false, raceNationFilter: null, raceNationSearch: "",
        openRaces: new Map(),
        error: null, searched: true };
  btn.disabled = true;
  render();
  try {
    S.competitions = await apiCompetitions(year, cat);
  } catch(e) { S.error = e.message; }
  finally { S.loadingComps = false; btn.disabled = false; render(); }

  // Auto-sélection : 1) comp sauvegardée si toujours présente, sinon
  //                  2) comp en cours aujourd'hui, sinon
  //                  3) la plus récente (sort desc → index 0)
  if (!S.error && S.competitions.length) {
    const saved = loadSelectedComp();
    let target = null;
    if (saved && saved.year === String(year) && saved.category === cat) {
      target = S.competitions.find(c => c.id === saved.id) || null;
    }
    if (!target) target = S.competitions.find(isOngoingComp) || S.competitions[0];
    if (target) selectComp(target.id);
  }
}

async function selectComp(id) {
  const comp = S.competitions.find(c => c.id === id);
  if (!comp) return;
  Object.assign(S, {
    selectedComp: comp, compTab: "races",
    races: [], loadingRaces: true, classFilter: null,
    entries: [], loadingEntries: false, entryClassFilter: null,
    raceNationPanelOpen: false, raceNationFilter: null, raceNationSearch: "",
    openRaces: new Map(),
  });
  N.allRaces = null;  // invalide le cache notifs (changement de comp)
  saveSelectedComp(comp,
    document.getElementById("sel-year").value,
    document.getElementById("sel-category").value);
  render();
  try { S.races = await apiRaces(id); }
  catch(e) { console.error(e); }
  finally { S.loadingRaces = false; render(); }
}

async function loadEntries() {
  if (!S.selectedComp) return;
  if (S.entries.length || S.loadingEntries) return; // already loaded/loading
  S.loadingEntries = true;
  render();
  try { S.entries = await apiEntries(S.selectedComp.id); }
  catch(e) { console.error("Entries error:", e); S.entries = []; }
  finally { S.loadingEntries = false; tryRestoreNation(); render(); }
}

// Bascule une course : ouvre si fermée, ferme si déjà ouverte
function toggleRaceDetail(id) {
  if (S.openRaces.has(id)) {
    S.openRaces.delete(id);
    render();
    return;
  }
  selectRace(id);
}

async function selectRace(id) {
  const race = S.races.find(r => r.id === id);
  if (!race) return;
  // Ajouter à la map avec état initial "en chargement"
  S.openRaces.set(id, { race, detail: null, loading: true, tab: "results" });
  render();
  requestAnimationFrame(() => {
    document.getElementById(`race-${id}`)?.scrollIntoView({ behavior: "smooth", block: "nearest" });
  });
  try {
    const detail = await apiRaceDetail(id);
    if (S.openRaces.has(id)) S.openRaces.get(id).detail = detail;
  } catch(e) { console.error(e); }
  finally {
    if (S.openRaces.has(id)) S.openRaces.get(id).loading = false;
    render();
  }
}

function clearAll() {
  Object.assign(S, {
    selectedComp: null, compTab: "races",
    races: [], classFilter: null,
    entries: [], entryClassFilter: null,
    raceNationPanelOpen: false, raceNationFilter: null, raceNationSearch: "",
    openRaces: new Map(),
  });
  render();
}

function setCompTab(t) {
  S.compTab = t;
  if (t === "entries") loadEntries();
  else render();
}
function setClassFilter(cls)      { S.classFilter = cls; render(); }
function setEntryClassFilter(cls) { S.entryClassFilter = cls; render(); }
function setRaceTab(id, tab) {
  if (S.openRaces.has(id)) S.openRaces.get(id).tab = tab;
  render();
}

// ── Nation filter (races tab) ─────────────────────────────────────────────
function toggleRaceNationPanel() {
  S.raceNationPanelOpen = !S.raceNationPanelOpen;
  if (S.raceNationPanelOpen && !S.entries.length && !S.loadingEntries) {
    loadEntries();
  } else {
    render();
  }
}
function setRaceNation(n) {
  S.raceNationFilter = n;
  if (n) {
    localStorage.setItem("wr-nation-races", n);
    addRecentNation(n);
  } else {
    localStorage.removeItem("wr-nation-races");
  }
  render();
}
function setRaceNationSearch(v) { S.raceNationSearch = v; render(); }

// Restaurer la nation sauvegardée (ou favorite) une fois les engagés chargés
function tryRestoreNation() {
  if (!S.entries.length) return;
  const saved = localStorage.getItem("wr-nation-races") || getFavNation();
  if (!saved) return;
  const nations = new Set();
  for (const evt of S.entries)
    for (const boat of (evt.boats || []))
      nations.add(boat.country?.DisplayName || boat.DisplayName || "");
  if (nations.has(saved)) {
    S.raceNationFilter    = saved;
    S.raceNationPanelOpen = true;
  }
}

// ── Favoris nations (partagés via localStorage) ──────────────────────────
function getFavNation() { return localStorage.getItem("wr-fav-nation") || null; }
function setFavNationStored(n) {
  if (!n) localStorage.removeItem("wr-fav-nation");
  else    localStorage.setItem("wr-fav-nation", n);
}
function getRecentNations() {
  try { return JSON.parse(localStorage.getItem("wr-fav-recents") || "[]"); }
  catch { return []; }
}
function addRecentNation(n) {
  if (!n) return;
  const list = getRecentNations().filter(x => x !== n);
  list.unshift(n);
  localStorage.setItem("wr-fav-recents", JSON.stringify(list.slice(0, 5)));
}
// Toggle : devient favorite si elle ne l'est pas, sinon retire
function toggleFavNation(n) {
  const cur = getFavNation();
  setFavNationStored(cur === n ? null : n);
  renderMoreMenu();
  render();
}

// ── Theme ─────────────────────────────────────────────────────────────────
function initTheme() {
  const isLight = localStorage.getItem("wr-theme") === "light";
  if (isLight) document.body.classList.add("light");
  document.getElementById("theme-icon").textContent = isLight ? "☀️" : "🌙";
}
function toggleTheme() {
  const isLight = document.body.classList.toggle("light");
  localStorage.setItem("wr-theme", isLight ? "light" : "dark");
  document.getElementById("theme-icon").textContent = isLight ? "☀️" : "🌙";
}

// ── Header : more menu (mobile) ───────────────────────────────────────────
function toggleMoreMenu(e) {
  if (e) e.stopPropagation();
  const m = document.getElementById("more-menu");
  const willOpen = !m.classList.contains("open");
  m.classList.toggle("open", willOpen);
  if (willOpen) renderMoreMenu();
}
function closeMoreMenu() {
  document.getElementById("more-menu").classList.remove("open");
}
function renderMoreMenu() {
  const notifOn = localStorage.getItem("wr-notif-enabled") === "on";
  const fav     = localStorage.getItem("wr-fav-nation");

  const elN = document.getElementById("menu-notif");
  elN.classList.toggle("on", notifOn);

  document.getElementById("menu-fav-info").textContent = fav
    ? t("menu_fav", { nation: fav })
    : t("menu_no_fav");

  const last = R.lastRefreshAt;

    ? t("menu_refresh_last", { when: fmtRelative(last) })

document.addEventListener("click", e => {

  if (!m.classList.contains("open")) return;
  if (e.target.closest("#more-menu") || e.target.closest("#btn-more")) return;
  m.classList.remove("open");
});

document.addEventListener("keydown", e => {
  if (e.key !== "Escape") return;

});

function initHeaderState() {
  // Auto-refresh toujours actif (V2 : plus de toggle)

}

// Auto-search au chargement : restaure les filtres mémorisés et lance une
// recherche pour afficher automatiquement la compétition en cours / la plus
// récente / celle qui était sélectionnée la dernière fois.
function autoSearchOnLoad() {
  const saved = loadSelectedComp();
  if (saved) {
    const yearSel = document.getElementById("sel-year");
    const catSel  = document.getElementById("sel-category");
    if ([...yearSel.options].some(o => o.value === saved.year))    yearSel.value = saved.year;
    if ([...catSel.options].some(o => o.value === saved.category)) catSel.value = saved.category;
  }
  search();
}
autoSearchOnLoad();
</script>
</body>
</html>
