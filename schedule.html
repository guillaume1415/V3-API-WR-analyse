<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Rowing — Schedule</title>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #23273a;
      --border: #2e3347; --accent: #3b82f6; --accent-hover: #2563eb;
      --gold: #f59e0b; --silver: #94a3b8; --bronze: #cd7c3c;
      --text: #e2e8f0; --text-muted: #64748b;
      --green: #10b981; --red: #ef4444; --orange: #f97316; --purple: #a855f7;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Header refondu (responsive) ── */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 20px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 100; min-height: 58px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: inherit; flex-shrink: 0;
    }
    .brand .logo {
      width: 34px; height: 34px; background: var(--accent); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .brand-text h1 { font-size: 1.05rem; font-weight: 600; line-height: 1.2; }
    .brand-text p  { font-size: 0.72rem; color: var(--text-muted); line-height: 1.2; margin-top: 2px; }

    .header-nav { display: flex; gap: 4px; align-items: center; }
    .nav-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 11px; border-radius: var(--radius);
      font-size: 0.82rem; font-weight: 500;
      border: 1px solid var(--border); color: var(--text-muted);
      cursor: pointer; text-decoration: none;
      transition: border-color .15s, color .15s, background .15s;
      white-space: nowrap;
    }
    .nav-link:hover  { border-color: var(--accent); color: var(--accent); }
    .nav-link.active {
      border-color: var(--accent); color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, var(--surface));
    }
    .nav-icon  { font-size: 0.95rem; line-height: 1; }

    .header-tools {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
    }
    .refresh-status {
      font-size: 0.7rem; color: var(--text-muted);
      padding: 0 4px; white-space: nowrap;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .refresh-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted); flex-shrink: 0;
    }
    .refresh-dot.on { background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%     { opacity: .35; }
    }
    .hdr-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 11px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); border-radius: var(--radius);
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
      transition: border-color .15s, color .15s, background .15s;
      white-space: nowrap; font-family: inherit; line-height: 1;
    }
    .hdr-btn:hover { border-color: var(--accent); color: var(--text); }
    .hdr-btn.on {
      border-color: var(--green); color: var(--green);
      background: color-mix(in srgb, var(--green) 12%, var(--surface2));
    }
    .hdr-icon { font-size: 0.95rem; line-height: 1; }

    .hdr-more {
      display: none;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); border-radius: var(--radius);
      padding: 6px 11px; font-size: 1.05rem; cursor: pointer;
      line-height: 1; font-weight: 700; font-family: inherit;
      transition: border-color .15s, color .15s;
    }
    .hdr-more:hover { border-color: var(--accent); color: var(--text); }

    .more-menu {
      display: none; position: fixed; top: 60px; right: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 6px;
      box-shadow: 0 6px 24px rgba(0,0,0,.5);
      min-width: 220px; z-index: 99;
      flex-direction: column; gap: 1px;
    }
    .more-menu.open { display: flex; }
    .more-menu button, .more-menu a {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 10px; background: transparent; border: none;
      color: var(--text); font-size: 0.85rem; font-weight: 500;
      cursor: pointer; border-radius: 5px; text-align: left;
      font-family: inherit; text-decoration: none;
    }
    .more-menu button:hover, .more-menu a:hover { background: var(--surface2); }
    .more-menu .menu-state {
      margin-left: auto; font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em;
      color: var(--text-muted);
    }
    .more-menu button.on .menu-state { color: var(--green); }
    .more-menu .menu-sep { border: none; border-top: 1px solid var(--border); margin: 3px 0; }
    .more-menu .menu-info {
      padding: 5px 10px; font-size: 0.7rem; color: var(--text-muted); line-height: 1.3;
    }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; }
    aside {
      width: 270px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border); padding: 18px;
      overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
    }
    main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    /* ── Sidebar controls ── */
    .filter-group label {
      display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text-muted); margin-bottom: 4px;
    }
    .filter-group select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 7px 9px; border-radius: var(--radius); font-size: 0.86rem; outline: none;
    }
    .filter-group select:focus { border-color: var(--accent); }
    .btn { width: 100%; padding: 8px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 0.86rem; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    hr { border: none; border-top: 1px solid var(--border); }

    /* ── Competition cards ── */
    .comp-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 9px 12px; cursor: pointer;
      font-size: 0.82rem; transition: border-color .15s;
    }
    .comp-card:hover  { border-color: var(--accent); }
    .comp-card.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, var(--surface2)); }
    .comp-card-name { font-weight: 600; margin-bottom: 2px; }
    .comp-card-meta { font-size: 0.72rem; color: var(--text-muted); }

    /* ── Day tabs ── */
    .day-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
    .day-tab {
      padding: 6px 14px; border-radius: var(--radius); font-size: 0.82rem; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text-muted);
      transition: border-color .15s, color .15s, background .15s;
    }
    .day-tab:hover  { border-color: var(--accent); color: var(--accent); }
    .day-tab.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 15%, var(--surface2)); color: var(--accent); font-weight: 600; }

    /* ── Pill filters ── */
    .pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      padding: 3px 10px; border-radius: 99px; font-size: 0.76rem; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text-muted);
      transition: border-color .15s, color .15s, background .15s; white-space: nowrap;
    }
    .pill:hover  { border-color: var(--accent); color: var(--accent); }
    .pill.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 15%, var(--surface2)); color: var(--accent); font-weight: 600; }

    /* ── Schedule timeline ── */
    .time-block { display: flex; flex-direction: column; gap: 4px; }
    .time-label  { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); padding: 4px 0; }

    .race-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px;
      display: flex; align-items: center; gap: 12px;
      transition: border-color .15s;
    }
    .race-card:hover { border-color: var(--accent); }

    .race-time {
      font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums;
      color: var(--text); width: 52px; flex-shrink: 0; text-align: center; line-height: 1;
    }
    .race-time small { display: block; font-size: 0.65rem; color: var(--text-muted); font-weight: 400; }

    .race-nr {
      width: 28px; height: 28px; border-radius: 50%; background: var(--surface2);
      border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; color: var(--text-muted); flex-shrink: 0;
    }

    .race-info { flex: 1; min-width: 0; }
    .race-name { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .race-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }

    .badge {
      display: inline-flex; align-items: center; padding: 1px 7px; border-radius: 99px;
      font-size: 0.68rem; font-weight: 600; white-space: nowrap;
    }
    .badge-class    { background: color-mix(in srgb, var(--accent) 15%, var(--surface2));  color: var(--accent); }
    .badge-heat     { background: color-mix(in srgb, var(--accent) 15%, var(--surface2));  color: var(--accent); }
    .badge-semi     { background: color-mix(in srgb, var(--orange) 15%, var(--surface2));  color: var(--orange); }
    .badge-final    { background: color-mix(in srgb, var(--gold)   15%, var(--surface2));  color: var(--gold); }
    .badge-quarter  { background: color-mix(in srgb, var(--purple) 15%, var(--surface2));  color: var(--purple); }
    .badge-prelim   { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .badge-official { background: color-mix(in srgb, var(--green)  15%, var(--surface2));  color: var(--green); }
    .badge-startlist{ background: color-mix(in srgb, var(--accent) 15%, var(--surface2));  color: var(--accent); }
    .badge-scheduled{ background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .badge-cancelled{ background: color-mix(in srgb, var(--red)    15%, var(--surface2));  color: var(--red); }

    /* ── Summary bar ── */
    .summary-bar {
      display: flex; gap: 12px; flex-wrap: wrap;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 16px; align-items: center;
      font-size: 0.82rem;
    }
    .summary-item { display: flex; align-items: center; gap: 5px; }

    /* ── Loading / empty ── */
    .loading { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 48px; color: var(--text-muted); }
    .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { padding: 40px; text-align: center; color: var(--text-muted); font-size: 0.86rem; }
    .section-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); }

    /* ── Collapsible filter panel ── */
    .collapsible-panel { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .collapsible-toggle {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px; background: var(--surface2); border: none; color: var(--text-muted);
      font-size: 0.8rem; font-weight: 600; cursor: pointer; text-align: left;
      transition: background .15s, color .15s;
    }
    .collapsible-toggle:hover { background: color-mix(in srgb, var(--accent) 10%, var(--surface2)); color: var(--text); }
    .collapsible-toggle.open  { color: var(--accent); }
    .collapsible-toggle .chevron { font-size: 0.65rem; transition: transform .2s; }
    .collapsible-toggle.open .chevron { transform: rotate(90deg); }
    .collapsible-body { display: none; padding: 10px 12px; border-top: 1px solid var(--border); }
    .collapsible-body.open { display: block; }

    /* ── Favoris nations ── */
    .fav-section {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 8px 10px;
      margin-bottom: 8px; display: flex; flex-direction: column; gap: 6px;
    }
    .fav-current {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      font-size: 0.78rem; color: var(--text-muted);
    }
    .fav-current .star { color: var(--gold); font-size: 0.95rem; }
    .fav-current .nation-name {
      color: var(--gold); font-weight: 700; cursor: pointer; padding: 1px 6px;
      border-radius: 4px; transition: background .15s;
    }
    .fav-current .nation-name:hover { background: color-mix(in srgb, var(--gold) 18%, transparent); }
    .fav-clear {
      cursor: pointer; color: var(--text-muted); font-size: 0.85rem;
      padding: 0 4px; border-radius: 3px; transition: color .15s, background .15s;
    }
    .fav-clear:hover { color: var(--red); background: var(--surface); }
    .fav-recents {
      display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
      font-size: 0.75rem; color: var(--text-muted);
    }
    .recent-chip {
      cursor: pointer; padding: 2px 8px; border-radius: 99px;
      background: var(--surface); border: 1px solid var(--border);
      font-size: 0.74rem; color: var(--text);
      transition: border-color .15s, color .15s;
    }
    .recent-chip:hover { border-color: var(--accent); color: var(--accent); }
    .nation-pill { display: inline-flex; align-items: center; gap: 4px; }
    .fav-star {
      cursor: pointer; opacity: .35; font-size: 0.85rem; line-height: 1;
      transition: opacity .15s, color .15s;
    }
    .fav-star:hover  { opacity: 1; color: var(--gold); }
    .fav-star.is-fav { opacity: 1; color: var(--gold); }

    /* Nation search input */
    .nation-search {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 6px 10px; border-radius: var(--radius);
      font-size: 0.82rem; outline: none; margin-bottom: 8px;
    }
    .nation-search:focus { border-color: var(--accent); }

    /* ── Race card clickable ── */
    .race-card { cursor: pointer; }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.65); backdrop-filter: blur(3px);
      z-index: 200; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; width: 100%; max-width: 680px;
      max-height: 88vh; display: flex; flex-direction: column;
      box-shadow: 0 24px 60px rgba(0,0,0,.6);
      animation: modalIn .18s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(16px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }
    .modal-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 16px 18px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-title { font-weight: 700; font-size: 1rem; margin-bottom: 3px; }
    .modal-sub   { font-size: 0.76rem; color: var(--text-muted); }
    .modal-close {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 6px; width: 28px; height: 28px;
      font-size: 0.95rem; cursor: pointer; flex-shrink: 0; margin-left: 10px;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, color .15s;
    }
    .modal-close:hover { border-color: var(--accent); color: var(--text); }
    .modal-body { overflow-y: auto; padding: 16px 18px; flex: 1; }

    .boat-row {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .boat-lane {
      width: 34px; height: 34px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 700; color: var(--text-muted); flex-shrink: 0;
    }
    .boat-country { font-weight: 700; font-size: 0.92rem; }
    .boat-athletes { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

    /* ── Light mode ── */
    body.light {
      --bg: #f1f5f9; --surface: #ffffff; --surface2: #f8fafc;
      --border: #e2e8f0; --text: #1e293b; --text-muted: #64748b;
      --accent: #2563eb; --accent-hover: #1d4ed8;
    }

    /* ── Toast notifications ── */
    .toast-container {
      position: fixed; bottom: 16px; right: 16px; z-index: 300;
      display: flex; flex-direction: column-reverse; gap: 8px;
      max-width: calc(100vw - 32px); pointer-events: none;
    }
    .toast {
      background: var(--surface); border: 1px solid var(--accent);
      border-left: 4px solid var(--accent); border-radius: var(--radius);
      padding: 12px 14px; box-shadow: 0 8px 24px rgba(0,0,0,.4);
      width: 320px; max-width: 100%;
      animation: toastIn .25s ease;
      pointer-events: auto;
      display: flex; gap: 10px; align-items: flex-start;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: none; }
    }
    .toast.fade-out { animation: toastOut .3s ease forwards; }
    @keyframes toastOut {
      to { opacity: 0; transform: translateX(20px); }
    }
    .toast-icon { font-size: 1.2rem; flex-shrink: 0; line-height: 1; }
    .toast-body { flex: 1; min-width: 0; }
    .toast-title { font-weight: 700; font-size: 0.88rem; margin-bottom: 3px; }
    .toast-text  { font-size: 0.78rem; color: var(--text-muted); line-height: 1.4; }
    .toast-close {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 0 4px; font-size: 1rem; line-height: 1;
      flex-shrink: 0;
    }
    .toast-close:hover { color: var(--text); }

    /* ── Header responsive ── */
    @media (max-width: 920px) {
      .brand-text p { display: none; }
      .brand-text h1 { font-size: 0.95rem; }
      .nav-link { padding: 6px 9px; }
    }
    @media (max-width: 760px) {
      header { padding: 9px 12px; gap: 8px; }
      .brand-text { display: none; }
      .nav-label, .hdr-lbl { display: none; }
      .refresh-status .lbl-text { display: none; }
      .hdr-btn { padding: 6px 9px; }
      .nav-link { padding: 6px 9px; }
    }
    @media (max-width: 560px) {
      .hdr-btn#btn-notif,
      .refresh-status { display: none; }
      .hdr-more { display: inline-flex; align-items: center; justify-content: center; }
    }

    @media (max-width: 720px) {
      .layout { flex-direction: column; }
      aside { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
      .modal-panel { max-height: 95vh; }
    }
  </style>
</head>
<body>

<header>
  <a class="brand" id="brand-link" href="schedule.html">
    <div class="logo">📅</div>
    <div class="brand-text">
      <h1 id="brand-h1">World Rowing — Schedule</h1>
      <p id="brand-p">Local interface · Official World Rowing API</p>
    </div>
  </a>

  <nav class="header-nav">
    <a class="nav-link" id="nav-results-link" href="index.html">
      <span class="nav-icon">🏆</span><span class="nav-label" id="nav-results-label">Results</span>
    </a>
    <a class="nav-link active" id="nav-schedule-link" href="schedule.html">
      <span class="nav-icon">📅</span><span class="nav-label" id="nav-schedule-label">Schedule</span>
    </a>
    <a class="nav-link" id="nav-live-link" href="live.html">
      <span class="nav-icon">📡</span><span class="nav-label" id="nav-live-label">Live</span>
    </a>
    <a class="nav-link" id="nav-analyse-link" href="analyse.html">
      <span class="nav-icon">📊</span><span class="nav-label" id="nav-analyse-label">Analyse</span>
    </a>
  </nav>

  <div class="header-tools">
    <span class="refresh-status" id="refresh-status">
      <span class="refresh-dot on" id="refresh-dot"></span>
      <span class="lbl-text" id="refresh-label">—</span>
    </span>
    <button class="hdr-btn" id="btn-notif" onclick="toggleNotifications()">
      <span class="hdr-icon">🔔</span><span class="hdr-lbl" id="btn-notifs-label">Notifs</span>
    </button>
    <button class="hdr-btn" id="btn-theme" onclick="toggleTheme()">
      <span class="hdr-icon" id="theme-icon">🌙</span>
    </button>
    <button class="hdr-btn" id="btn-lang" onclick="toggleLang()">
      <span class="hdr-icon" id="lang-icon">EN</span>
    </button>
    <button class="hdr-more" id="btn-more" onclick="toggleMoreMenu(event)">⋯</button>
  </div>

  <div class="more-menu" id="more-menu">
    <button onclick="toggleNotifications(); renderMoreMenu();" id="menu-notif">

const DIRECT_BASE = "https://world-rowing-api.soticcloud.net/stats/api";

  competitions: [], loadingComps: false, searched: false,
  selectedComp: null,
  races: [], loadingRaces: false,

// ── Helpers ───────────────────────────────────────────────────────────────
function buildUrl(path, params) {
  const parts = [];
  for (const [k, v] of Object.entries(params)) {
    if (v == null) continue;
    parts.push(encodeURIComponent(k) + "=" + encodeURIComponent(v));
  }
  return getBase() + path + (parts.length ? "?" + parts.join("&") : "");
}

async function apiFetch(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function esc(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function getLocale() { return getLang() === "fr" ? "fr-FR" : "en-GB"; }

function fmtDate(d) {
  if (!d) return "—";
  try {
    return new Date(String(d).replace(" ","T"))
      .toLocaleDateString(getLocale(), {day:"2-digit", month:"short", year:"numeric"});
  } catch { return d; }
}

// Formater l'heure depuis DateString (ISO avec timezone)
function fmtTime(dateString) {
  if (!dateString) return "—";
  try {
    return new Date(dateString).toLocaleTimeString(getLocale(), {hour:"2-digit", minute:"2-digit"});
  } catch { return "—"; }
}

// Formater le jour depuis DateString
function fmtDay(dateString) {
  if (!dateString) return "?";
  try {
    return new Date(dateString).toLocaleDateString(getLocale(), {weekday:"short", day:"2-digit", month:"short"});
  } catch { return dateString.slice(0,10); }
}

function dayKey(dateString) {
  if (!dateString) return "?";
  // Extraire la date locale à partir de l'ISO string
  try {
    const d = new Date(dateString);
    return d.toISOString().slice(0,10); // YYYY-MM-DD en UTC
  } catch { return dateString.slice(0,10); }
}

function phaseBadgeClass(phase) {
  if (!phase) return "badge-prelim";
  const p = phase.toLowerCase();
  if (p.includes("final") && !p.includes("semi") && !p.includes("quarter")) return "badge-final";
  if (p.includes("semi")) return "badge-semi";
  if (p.includes("quarter")) return "badge-quarter";
  if (p.includes("heat")) return "badge-heat";
  if (p.includes("prelim")) return "badge-prelim";
  return "badge-prelim";
}

// ── Tri des classes de bateau : Open → Light → Para → Mix, M → W → Mix ──
function boatClassSortKey(name) {
  const s = String(name || "").trim();
  let cat = 3, gender = 2;
  if (/^PR\d?\s*M/i.test(s))      { cat = 2; gender = 0; }
  else if (/^PR\d?\s*W/i.test(s)) { cat = 2; gender = 1; }
  else if (/^PR/i.test(s))        { cat = 2; gender = 2; }
  else if (/^LM/i.test(s))        { cat = 1; gender = 0; }
  else if (/^LW/i.test(s))        { cat = 1; gender = 1; }
  else if (/^M(?!ix)/i.test(s))   { cat = 0; gender = 0; }
  else if (/^W/i.test(s))         { cat = 0; gender = 1; }
  else if (/^Mix/i.test(s))       { cat = 0; gender = 2; }
  return [cat, gender, s];
}
function sortClasses(arr) {
  return [...arr].sort((a, b) => {
    const ka = boatClassSortKey(a), kb = boatClassSortKey(b);
    return ka[0] - kb[0] || ka[1] - kb[1] || ka[2].localeCompare(kb[2]);
  });
}

// ── Tri des athlètes par poste : C, S, [N décroissants], B ──────────────
function positionRank(pos) {
  const p = String(pos ?? "").trim().toUpperCase();
  if (p === "C" || p.startsWith("COX")) return -1;
  if (p === "S" || p.startsWith("STR")) return 0;
  if (p === "B" || p.startsWith("BOW")) return 999;
  const n = parseInt(p, 10);
  if (!isNaN(n)) return 100 - n;
  return 500;
}
function sortAthletes(arr, getPos) {
  const fn = getPos || (a => a.position ?? a.boatPosition);
  return [...arr].sort((a, b) => positionRank(fn(a)) - positionRank(fn(b)));
}

function statusBadgeClass(status) {
  if (!status) return "badge-scheduled";
  const s = status.toLowerCase();
  if (s.includes("official")) return "badge-official";
  if (s.includes("start")) return "badge-startlist";
  if (s.includes("cancelled")) return "badge-cancelled";
  return "badge-scheduled";
}

// ── API ───────────────────────────────────────────────────────────────────
async function apiCompetitions(year, category) {
  const url = buildUrl("/competition", {
    "filter[StartDate]": `${year}-12-31T23:59:59.000Z`,
    "filter[competitionType.competitionCategory.DisplayName]": category,
    "filterOptions[StartDate]": "lessThanEqualTo",
    "include": "competitionType,competitionType.competitionCategory,venue,venue.country",
    "sort[StartDate]": "desc",
  });
  const payload = await apiFetch(url);
  const data = Array.isArray(payload.data) ? payload.data : [];
  return data.filter(c => String(c.StartDate || "").startsWith(String(year)));
}

async function apiEntries(competitionId) {
  const url = buildUrl(`/competition/${competitionId}`, {
    "include": "events.boats.boatAthletes.person,events.boatClass,events.boats.country",
  });
  const payload = await apiFetch(url);
  return Array.isArray(payload.data?.events) ? payload.data.events : [];
}

// Build Set<boatClassDisplay> for a given nation from entries
function nationBoatClasses(nation) {
  const classes = new Set();
  for (const evt of S.entries) {
    const cls = evt.boatClass?.DisplayName;
    if (!cls) continue;
    for (const boat of (evt.boats || [])) {
      if ((boat.country?.DisplayName || boat.DisplayName) === nation) {
        classes.add(cls); break;
      }
    }
  }
  return classes;
}

async function apiSchedule(competitionId) {
  const url = buildUrl("/race/", {
    "filter[event.competitionId]": competitionId,
    "include": "event.competition,event.boatClass,raceStatus,racePhase,raceBoats",
    "sort[DateString]": "asc",
    "paginate": "200",
  });
  const payload = await apiFetch(url);
  return Array.isArray(payload.data) ? payload.data : [];
}

async function apiStartList(raceId) {
  // Inclure aussi invalidMarkResultCode pour pouvoir afficher les résultats
  // si la course est officielle (raceStatus = Official)
  const url = buildUrl(`/race/${raceId}`, {
    "include": "raceStatus,racePhase,raceBoats.raceBoatAthletes.person,raceBoats.invalidMarkResultCode",
  });
  return apiFetch(url);
}

// Tous les codes pays (NED, NED2, …) pour un libellé engagés (nom complet ou code).
function nationCodesFromEntries(fullName) {
  const codes = new Set();
  if (!fullName) return [];
  for (const evt of S.entries) {
    for (const boat of (evt.boats || [])) {
      const code = boat.DisplayName;
      if (!code) continue;
      const label = boat.country?.DisplayName || code;
      if (label === fullName || boat.country?.DisplayName === fullName || code === fullName) {
        codes.add(code);
      }
    }
  }
  if (!codes.size) codes.add(fullName);
  return [...codes];
}

function raceMatchesNationCodes(race, codes) {
  const set = new Set(codes);
  return (race.raceBoats || []).some(b => b.DisplayName && set.has(b.DisplayName));
}

// ── Render ────────────────────────────────────────────────────────────────
function renderCompList() {
  const el = document.getElementById("comp-list");
  if (!S.competitions.length) {
    el.innerHTML = S.searched
      ? `<div class="empty" style="padding:8px 0;">${t("no_comps")}</div>`
      : "";
    return;
  }
  el.innerHTML = S.competitions.map(c => {
    const name  = c.DisplayName || c.CompetitionCode || c.id;
    const venue = c.venue?.DisplayName || "";
    const start = fmtDate(c.StartDate);
    const end   = fmtDate(c.EndDate);
    const active = S.selectedComp?.id === c.id ? "active" : "";
    return `
      <div class="comp-card ${active}" onclick="selectComp('${c.id}')">
        <div class="comp-card-name">${esc(name)}</div>
        <div class="comp-card-meta">${venue ? "📍 "+esc(venue)+" · " : ""}📅 ${start}${end&&end!==start?" → "+end:""}</div>
      </div>`;
  }).join("");
}

function render() {
  const main = document.getElementById("main-area");

  if (S.loadingRaces) {
    main.innerHTML = `<div class="loading"><div class="spinner"></div>${t("loading_schedule")}</div>`;
    return;
  }

  if (!S.selectedComp) {
    main.innerHTML = `<div class="empty">${t("pick_comp")}</div>`;
    return;
  }

  if (!S.races.length) {
    main.innerHTML = `<div class="empty">${t("no_race")}</div>`;
    return;
  }

  // ── Collect metadata ──
  const days    = [...new Set(S.races.map(r => dayKey(r.DateString)))].sort();
  const phases  = [...new Set(S.races.map(r => (r.racePhase?.DisplayName || "?")))].sort();
  const classes = sortClasses([...new Set(S.races.map(r => (r.event?.boatClass?.DisplayName || "?")))]);

  // ── Apply filters ──
  let races = S.races;
  if (S.dayFilter)   races = races.filter(r => dayKey(r.DateString) === S.dayFilter);
  if (S.phaseFilter) races = races.filter(r => (r.racePhase?.DisplayName || "") === S.phaseFilter);
  if (S.classFilter) races = races.filter(r => (r.event?.boatClass?.DisplayName || "") === S.classFilter);
  if (S.nationFilter) {
    const codes = S.entriesLoaded
      ? nationCodesFromEntries(S.nationFilter)
      : [S.nationFilter];
    races = races.filter(r => raceMatchesNationCodes(r, codes));
  }

  // ── Counts per status ──
  const total    = races.length;
  const official = races.filter(r => (r.raceStatus?.DisplayName||"").toLowerCase().includes("official")).length;
  const startList= races.filter(r => (r.raceStatus?.DisplayName||"").toLowerCase().includes("start")).length;
  const scheduled= races.filter(r => (r.raceStatus?.DisplayName||"").toLowerCase() === "scheduled").length;
  const cancelled= races.filter(r => (r.raceStatus?.DisplayName||"").toLowerCase().includes("cancel")).length;

  // ── Group by day ──
  const byDay = {};
  for (const r of races) {
    const k = dayKey(r.DateString);
    (byDay[k] = byDay[k] || []).push(r);
  }

  let html = `
    <!-- Competition header -->
    <div>
      <div style="font-weight:700;font-size:1.05rem;">${esc(S.selectedComp.DisplayName || "")}</div>
      <div style="font-size:0.78rem;color:var(--text-muted);margin-top:2px;">
        ${esc(S.selectedComp.venue?.DisplayName || "")} ·
        ${fmtDate(S.selectedComp.StartDate)} → ${fmtDate(S.selectedComp.EndDate)}
      </div>
    </div>

    <!-- Summary bar -->
    <div class="summary-bar">
      <div class="summary-item">${t("sched_n_races", { n: `<strong>${total}</strong>` })}</div>
      ${official  ? `<div class="summary-item"><span class="badge badge-official">${getLang()==="fr"?"Officiel":"Official"}</span> ${official}</div>` : ""}
      ${startList ? `<div class="summary-item"><span class="badge badge-startlist">Start List</span> ${startList}</div>` : ""}
      ${scheduled ? `<div class="summary-item"><span class="badge badge-scheduled">${getLang()==="fr"?"Prévu":"Scheduled"}</span> ${scheduled}</div>` : ""}
      ${cancelled ? `<div class="summary-item"><span class="badge badge-cancelled">${getLang()==="fr"?"Annulé":"Cancelled"}</span> ${cancelled}</div>` : ""}
    </div>

    <!-- Day tabs -->
    <div>
      <div class="section-title" style="margin-bottom:6px;">${t("filter_day")}</div>
      <div class="day-tabs">
        <div class="day-tab ${!S.dayFilter?"active":""}" onclick="setDay(null)">${t("all")}</div>
        ${days.map(d => `<div class="day-tab ${S.dayFilter===d?"active":""}" onclick="setDay('${d}')">${fmtDay(d+"T00:00:00")}</div>`).join("")}
      </div>
    </div>

    <!-- Phase filter -->
    <div>
      <div class="section-title" style="margin-bottom:6px;">${t("filter_phase")}</div>
      <div class="pills">
        <div class="pill ${!S.phaseFilter?"active":""}" onclick="setPhase(null)">${t("all")}</div>
        ${phases.map(p => `<div class="pill ${S.phaseFilter===p?"active":""}" onclick="setPhase('${esc(p)}')">${esc(p)}</div>`).join("")}
      </div>
    </div>

    <!-- Class filter -->
    <div>
      <div class="section-title" style="margin-bottom:6px;">${t("filter_class")}</div>
      <div class="pills">
        <div class="pill ${!S.classFilter?"active":""}" onclick="setClass(null)">${t("all")}</div>
        ${classes.map(c => `<div class="pill ${S.classFilter===c?"active":""}" onclick="setClass('${esc(c)}')">${esc(c)}</div>`).join("")}
      </div>
    </div>

    <!-- Nation filter (collapsed by default) -->
    ${renderNationPanel()}`;

  function renderNationPanel() {
    const isOpen = S.nationPanelOpen;
    const toggleCls = isOpen ? "open" : "";

    let body = "";
    if (isOpen) {
      if (S.loadingEntries) {
        body = `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;color:var(--text-muted);font-size:0.8rem;">
                  <div class="spinner" style="width:16px;height:16px;border-width:2px;"></div> ${t("loading")}
                </div>`;
      } else if (!S.entriesLoaded) {
        body = `<button class="btn" style="font-size:0.78rem;padding:6px;" onclick="loadNationEntries()">
                  ${t("load_nations")}
                </button>`;
      } else {
        // Build nations list from entries
        const allNations = [...new Set(
          S.entries.flatMap(evt => (evt.boats||[]).map(b => b.country?.DisplayName || b.DisplayName || "?"))
        )].sort();

        const q = S.nationSearch.toLowerCase();
        const filtered = q ? allNations.filter(n => n.toLowerCase().includes(q)) : allNations;

        const fav     = getFavNation();
        const recents = getRecentNations().filter(n => n !== fav).slice(0, 4);

        const favSection = (fav || recents.length) ? `
          <div class="fav-section">
            ${fav ? `
              <div class="fav-current">
                <span class="star">★</span>
                <span style="color:var(--text-muted);">${t("fav_label")}</span>
                <span class="nation-name" onclick="setNation('${esc(fav)}')">${esc(fav)}</span>
                <span class="fav-clear" title="${t("fav_remove")}" onclick="toggleFavNation('${esc(fav)}')">✕</span>
              </div>` : ''}
            ${recents.length ? `
              <div class="fav-recents">
                <span>🕐 ${t("recents_label")}</span>
                ${recents.map(n => `<span class="recent-chip" onclick="setNation('${esc(n)}')">${esc(n)}</span>`).join("")}
              </div>` : ''}
          </div>` : '';

        body = `
          <input class="nation-search" type="text" placeholder="🔍 ${t("search_nation")}"
            value="${esc(S.nationSearch)}"
            oninput="S.nationSearch=this.value; render()" />
          ${favSection}
          <div class="pills" style="max-height:200px;overflow-y:auto;">
            <div class="pill ${!S.nationFilter?"active":""}" onclick="setNation(null)">${t("all")}</div>
            ${filtered.map(n => {
              const isFav    = fav === n;
              const isActive = S.nationFilter === n;
              return `<div class="pill nation-pill ${isActive?"active":""}" onclick="setNation('${esc(n)}')">
                <span class="fav-star ${isFav?"is-fav":""}" title="${isFav?t("fav_remove"):t("fav_add")}"
                      onclick="event.stopPropagation();toggleFavNation('${esc(n)}')">${isFav?"★":"☆"}</span>
                <span>${esc(n)}</span>
              </div>`;
            }).join("")}
          </div>
          ${S.nationFilter ? `<div style="margin-top:8px;font-size:0.75rem;color:var(--accent);">
            ${t("sched_filter_active")} <strong>${esc(S.nationFilter)}</strong>
            <span onclick="setNation(null)" style="cursor:pointer;margin-left:4px;color:var(--text-muted);">✕</span>
          </div>` : ""}`;
      }
    }

    const toggleLabel = S.nationFilter
      ? t("filter_nation_btn_active", { nation: "<span style='color:var(--accent);'>"+esc(S.nationFilter)+"</span>" })
      : t("filter_nation_btn");
    return `
      <div class="collapsible-panel">
        <button class="collapsible-toggle ${toggleCls}" onclick="toggleNationPanel()">
          <span>${toggleLabel}</span>
          <span class="chevron">▶</span>
        </button>
        ${isOpen ? `<div class="collapsible-body open">${body}</div>` : ""}
      </div>`;
  }

  // ── Race timeline ──
  if (!races.length) {
    html += `<div class="empty">${t("sched_no_for_filter")}</div>`;
  } else {
    for (const day of Object.keys(byDay).sort()) {
      const dayRaces = byDay[day];
      html += `
        <div>
          <div style="font-weight:700;font-size:0.88rem;color:var(--text-muted);
                      padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:8px;">
            📅 ${fmtDay(day+"T12:00:00")} — ${t("sched_n_races", { n: dayRaces.length })}
          </div>
          <div style="display:flex;flex-direction:column;gap:5px;">`;

      for (const race of dayRaces) {
        const time     = fmtTime(race.DateString);
        const name     = race.DisplayName || race.id;
        const nr       = race.RaceNr || "—";
        const phase    = race.racePhase?.DisplayName || "—";
        const cls      = race.event?.boatClass?.DisplayName || "—";
        const status   = race.raceStatus?.DisplayName || "—";
        const phaseCls = phaseBadgeClass(phase);
        const statCls  = statusBadgeClass(status);
        const rscCode  = race.RscCode || "";

        html += `
          <div class="race-card" onclick="openStartList('${race.id}')">
            <div class="race-time">${esc(time)}<small>heure locale</small></div>
            <div class="race-nr" title="Course n°${nr}">${nr}</div>
            <div class="race-info">
              <div class="race-name" title="${esc(rscCode)}">${esc(name)}</div>
              <div class="race-tags">
                <span class="badge badge-class">${esc(cls)}</span>
                <span class="badge ${phaseCls}">${esc(phase)}</span>
                <span class="badge ${statCls}">${esc(status)}</span>
              </div>
            </div>
            <div style="font-size:0.7rem;color:var(--text-muted);flex-shrink:0;">👁</div>
          </div>`;
      }
      html += `</div></div>`;
    }
  }

  main.innerHTML = html;
}

// ── Persistence : compétition sélectionnée (partagée index ↔ schedule) ──
function saveSelectedComp(comp, year, category) {
  if (!comp) { localStorage.removeItem("wr-selected-comp"); return; }
  try {
    localStorage.setItem("wr-selected-comp", JSON.stringify({
      id: comp.id, year: String(year), category: String(category),
    }));
  } catch {}
}
function loadSelectedComp() {
  try {
    const raw = localStorage.getItem("wr-selected-comp");
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function isOngoingComp(c) {
  const today = new Date().toISOString().slice(0,10);
  const start = String(c.StartDate || "").slice(0,10);
  const end   = String(c.EndDate   || "").slice(0,10);
  return start && end && start <= today && today <= end;
}

// ── Actions ───────────────────────────────────────────────────────────────
async function search() {
  const year = document.getElementById("sel-year").value;
  const cat  = document.getElementById("sel-category").value;
  const btn  = document.getElementById("btn-search");

  S = { competitions: [], loadingComps: true, searched: false,
        selectedComp: null, races: [], loadingRaces: false,
        dayFilter: null, phaseFilter: null, classFilter: null,
        nationPanelOpen: false, entries: [], loadingEntries: false,
        entriesLoaded: false, nationSearch: "", nationFilter: null,
        modalRace: null, modalDetail: null, loadingModal: false,
        error: null };
  btn.disabled = true;
  renderCompList();

  try {
    S.competitions = await apiCompetitions(year, cat);
  } catch(e) {
    console.error(e);
  } finally {
    S.loadingComps = false; S.searched = true;
    btn.disabled = false;
    renderCompList();
    render();
  }

  // Auto-sélection
  if (S.competitions.length) {
    const saved = loadSelectedComp();
    let target = null;
    if (saved && saved.year === String(year) && saved.category === cat) {
      target = S.competitions.find(c => c.id === saved.id) || null;
    }
    if (!target) target = S.competitions.find(isOngoingComp) || S.competitions[0];
    if (target) selectComp(target.id);
  }
}

async function selectComp(id) {
  const comp = S.competitions.find(c => c.id === id);
  if (!comp) return;
  S.selectedComp = comp;
  S.races = []; S.loadingRaces = true;
  S.dayFilter = null; S.phaseFilter = null; S.classFilter = null;
  S.nationFilter = null; S.nationSearch = "";
  S.entries = []; S.entriesLoaded = false; S.nationPanelOpen = false;
  S.modalRace = null; S.modalDetail = null; S.loadingModal = false;
  saveSelectedComp(comp,
    document.getElementById("sel-year").value,
    document.getElementById("sel-category").value);
  renderCompList();
  render();
  try {
    S.races = await apiSchedule(id);
    const today = new Date().toISOString().slice(0,10);
    const days = [...new Set(S.races.map(r => dayKey(r.DateString)))].sort();
    if (days.includes(today)) S.dayFilter = today;
  } catch(e) {
    console.error(e); S.races = [];
  } finally {
    S.loadingRaces = false;
    renderCompList();
    render();
  }
}

function setDay(d)   { S.dayFilter   = d; render(); }
function setPhase(p) { S.phaseFilter = p; render(); }
function setClass(c) { S.classFilter = c; render(); }
function setNation(n) {
  S.nationFilter = n;
  if (n) {
    localStorage.setItem("wr-nation-schedule", n);
    addRecentNation(n);
  } else {
    localStorage.removeItem("wr-nation-schedule");
  }
  render();
}

function toggleNationPanel() {
  S.nationPanelOpen = !S.nationPanelOpen;
  render();
}

async function loadNationEntries() {
  if (!S.selectedComp || S.loadingEntries) return;
  S.loadingEntries = true;
  render();
  try {
    S.entries = await apiEntries(S.selectedComp.id);
    S.entriesLoaded = true;
    tryRestoreNation();
  } catch(e) {
    console.error(e); S.entries = [];
  } finally {
    S.loadingEntries = false;
    render();
  }
}

// ── Start list modal ─────────────────────────────────────────────────────
async function openStartList(raceId) {
  const race = S.races.find(r => r.id === raceId);
  if (!race) return;
  S.modalRace = race; S.modalDetail = null; S.loadingModal = true;
  renderModal();
  try { S.modalDetail = await apiStartList(raceId); }
  catch(e) { console.error(e); }
  finally { S.loadingModal = false; renderModal(); }
}

function renderModal() {
  const overlay = document.getElementById("modal-overlay");
  if (!S.modalRace) { overlay.classList.remove("open"); return; }
  overlay.classList.add("open");

  const race    = S.modalRace;
  const detail  = S.modalDetail?.data;
  // Statut le plus à jour : depuis le détail si dispo, sinon depuis la liste
  const status  = detail?.raceStatus?.DisplayName || race.raceStatus?.DisplayName || "—";
  const phase   = race.racePhase?.DisplayName || "—";
  const cls     = race.event?.boatClass?.DisplayName || "—";
  const time    = fmtTime(race.DateString);
  const isFinal = String(status).toLowerCase() === "official";

  document.getElementById("modal-title").textContent = race.DisplayName || race.id;
  document.getElementById("modal-sub").textContent   = `${cls} · ${phase} · ${time} · ${status}`;

  const body = document.getElementById("modal-body");

  if (S.loadingModal) {
    body.innerHTML = `<div class="loading"><div class="spinner"></div>${t("modal_loading")}</div>`;
    return;
  }

  const boats = detail?.raceBoats || [];
  if (!boats.length) {
    body.innerHTML = `<div class="empty">${t("modal_no_crew")}</div>`;
    return;
  }

  body.innerHTML = isFinal ? renderResultsView(boats) : renderStartListView(boats);
}

function renderStartListView(boats) {
  const sorted = [...boats].sort((a, b) => (a.Lane ?? 99) - (b.Lane ?? 99));
  let html = `<div style="font-size:0.74rem;color:var(--text-muted);margin-bottom:10px;">
    ${t("modal_startlist")} · ${t("n_crews", { n: sorted.length })}</div>
    <div style="display:flex;flex-direction:column;gap:6px;">`;
  for (const boat of sorted) {
    const code  = boat.DisplayName || "—";
    const lane  = boat.Lane ?? "—";
    const ath   = sortAthletes(boat.raceBoatAthletes || [], a => a.boatPosition);
    const names = ath.length
      ? ath.map(a => {
          const p = a.person || {};
          const nm = [p.FirstName, p.LastName].filter(Boolean).join(" ") || p.DisplayName || "?";
          return a.boatPosition ? `${a.boatPosition}· ${nm}` : nm;
        }).join(" · ")
      : "—";
    html += `
      <div class="boat-row">
        <div class="boat-lane" title="${t("hdr_lane")}">${esc(lane)}</div>
        <div style="flex:1;min-width:0;">
          <div class="boat-country">${esc(code)}</div>
          <div class="boat-athletes">${esc(names)}</div>
        </div>
      </div>`;
  }
  return html + `</div>`;
}

function renderResultsView(boats) {
  // Trier par rang (les bateaux disqualifiés/sans rang vont à la fin)
  const sorted = [...boats].sort((a, b) => (a.Rank ?? 99) - (b.Rank ?? 99));

  const fmtT = (t) => !t ? "—" : String(t).trim().replace(/^00:/, "");
  const rk   = (r) => r==1?"🥇":r==2?"🥈":r==3?"🥉":(r||"—");
  const rkCls= (r) => r==1?"rank-1":r==2?"rank-2":r==3?"rank-3":"";

  const thStyle = `style="text-align:left;padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:0.7rem;text-transform:uppercase;color:var(--text-muted);"`;
  let html = `<div style="font-size:0.74rem;color:var(--text-muted);margin-bottom:10px;">
    ${t("modal_results")} · ${t("n_crews", { n: sorted.length })}</div>
    <div class="table-wrap"><table style="width:100%;border-collapse:collapse;font-size:0.85rem;">
    <thead><tr>
      <th ${thStyle}>${t("hdr_rank")}</th>
      <th ${thStyle}>${t("hdr_lane")}</th>
      <th ${thStyle}>${t("hdr_country")}</th>
      <th ${thStyle}>${t("hdr_athletes")}</th>
      <th ${thStyle}>${t("hdr_time")}</th>
    </tr></thead><tbody>`;

  for (const boat of sorted) {
    const mark   = boat.invalidMarkResultCode;
    const markName = mark ? (typeof mark === "object" ? mark.DisplayName : mark) : null;
    const ath    = sortAthletes(boat.raceBoatAthletes || [], a => a.boatPosition);
    const names  = ath.length
      ? ath.map(a => {
          const p = a.person || {};
          const nm = [p.FirstName, p.LastName].filter(Boolean).join(" ") || p.DisplayName || "?";
          return a.boatPosition ? `${a.boatPosition}· ${nm}` : nm;
        }).join(" · ")
      : "—";
    const timeStr = markName ? `<span class="badge badge-cancelled">${esc(markName)}</span>`
                             : `<span style="font-family:monospace;">${esc(fmtT(boat.ResultTime))}</span>`;
    html += `
      <tr style="border-bottom:1px solid var(--border);">
        <td class="${rkCls(boat.Rank)}" style="padding:8px 12px;font-weight:700;">${rk(boat.Rank)}</td>
        <td style="padding:8px 12px;color:var(--text-muted);">${esc(boat.Lane ?? "—")}</td>
        <td style="padding:8px 12px;font-weight:600;">${esc(boat.DisplayName || "—")}</td>
        <td style="padding:8px 12px;color:var(--text-muted);font-size:0.78rem;">${esc(names)}</td>
        <td style="padding:8px 12px;">${timeStr}</td>
      </tr>`;
  }
  return html + `</tbody></table></div>`;
}

function closeModal() {
  S.modalRace = null; S.modalDetail = null; S.loadingModal = false;
  document.getElementById("modal-overlay").classList.remove("open");
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ── Restaurer nation sauvegardée (ou favorite) ───────────────────────────
function tryRestoreNation() {
  if (!S.entriesLoaded) return;
  const saved = localStorage.getItem("wr-nation-schedule") || getFavNation();
  if (!saved) return;
  const codes  = nationCodesFromEntries(saved);
  const exists = S.races.some(r => raceMatchesNationCodes(r, codes));
  if (exists) {
    S.nationFilter    = saved;
    S.nationPanelOpen = true;
  }
}

// ── Favoris nations (partagés via localStorage) ──────────────────────────
function getFavNation() { return localStorage.getItem("wr-fav-nation") || null; }
function setFavNationStored(n) {
  if (!n) localStorage.removeItem("wr-fav-nation");
  else    localStorage.setItem("wr-fav-nation", n);
}
function getRecentNations() {
  try { return JSON.parse(localStorage.getItem("wr-fav-recents") || "[]"); }
  catch { return []; }
}
function addRecentNation(n) {
  if (!n) return;
  const list = getRecentNations().filter(x => x !== n);
  list.unshift(n);
  localStorage.setItem("wr-fav-recents", JSON.stringify(list.slice(0, 5)));
}
function toggleFavNation(n) {
  const cur = getFavNation();
  setFavNationStored(cur === n ? null : n);
  renderMoreMenu();
  render();
}

function initTheme() {

function toggleTheme() {

// ── Header : more menu ───────────────────────────────────────────────────
function toggleMoreMenu(e) {
  if (e) e.stopPropagation();
  const m = document.getElementById("more-menu");
  const willOpen = !m.classList.contains("open");
  m.classList.toggle("open", willOpen);
  if (willOpen) renderMoreMenu();
}
function closeMoreMenu() {
  document.getElementById("more-menu").classList.remove("open");
}
function renderMoreMenu() {
  const notifOn = localStorage.getItem("wr-notif-enabled") === "on";
  const fav     = localStorage.getItem("wr-fav-nation");

  const elN = document.getElementById("menu-notif");
  elN.classList.toggle("on", notifOn);
  document.getElementById("menu-notif-state").textContent = notifOn ? "ON" : "OFF";

  document.getElementById("menu-fav-info").textContent = fav
    ? t("menu_fav", { nation: fav })
    : t("menu_no_fav");

  const last = R.lastRefreshAt;
  document.getElementById("menu-refresh-info").textContent = last
    ? t("menu_refresh_last", { when: fmtRelative(last) })
    : t("menu_refresh_active");
}

document.addEventListener("click", e => {
  const m = document.getElementById("more-menu");
  if (!m.classList.contains("open")) return;
  if (e.target.closest("#more-menu") || e.target.closest("#btn-more")) return;
  m.classList.remove("open");
});

// ── Fmt : "Xs ago / il y a X min" ────────────────────────────────────────
function fmtRelative(ts) {
  if (!ts) return "—";
  const sec = Math.max(0, Math.floor((Date.now() - ts) / 1000));
  if (sec < 60)   return t("ago_sec",  { n: sec });
  if (sec < 3600) return t("ago_min",  { n: Math.floor(sec/60) });
  return            t("ago_hour", { n: Math.floor(sec/3600) });
}

// ── Notifications toggle ──────────────────────────────────────────────────
function toggleNotifications() {
  if (!N.on) {
    if (!("Notification" in window)) {
      alert(t("notif_no_browser"));
      return;
    }
    if (Notification.permission === "default") {
      Notification.requestPermission().then(p => {
        if (p === "granted" || p === "denied") {
          N.on = true;
          localStorage.setItem("wr-notif-enabled", "on");
          document.getElementById("btn-notif").classList.toggle("on", true);
          startNotificationLoop();
        }
      });
      return;
    }
    N.on = true;
    localStorage.setItem("wr-notif-enabled", "on");
    document.getElementById("btn-notif").classList.toggle("on", true);
    startNotificationLoop();
  } else {
    N.on = false;
    localStorage.setItem("wr-notif-enabled", "off");
    document.getElementById("btn-notif").classList.toggle("on", false);
    stopNotificationLoop();
  }
}

// ── Auto-refresh : implémentation (toujours actif, pas de pause hidden) ──
async function refreshAll() {
  if (!S.selectedComp) {
    R.lastRefreshAt = Date.now();
    updateRefreshStatus();
    return;
  }
  const cId = S.selectedComp.id;
  try {
    const races = await apiSchedule(cId);
    if (S.selectedComp?.id === cId) S.races = races;
    R.lastRefreshAt = Date.now();
    render();
    updateRefreshStatus();
    if (document.getElementById("more-menu")?.classList.contains("open")) renderMoreMenu();
  } catch(e) {
    console.warn("[auto-refresh]", e);
  }
}

function startAutoRefresh() {
  if (R.intervalId) clearInterval(R.intervalId);
  R.intervalId = setInterval(refreshAll, 30000);
  refreshAll();
}
function stopAutoRefresh() {
  if (R.intervalId) { clearInterval(R.intervalId); R.intervalId = null; }
}

setInterval(updateRefreshStatus, 5000);

// ── Notifications : implémentation ───────────────────────────────────────
function getNotifShownKey() {
  return `wr-notif-shown-${new Date().toISOString().slice(0,10)}`;
}
function loadShownToday() {
  try { return new Set(JSON.parse(localStorage.getItem(getNotifShownKey()) || "[]")); }
  catch { return new Set(); }
}
function saveShownToday(set) {
  localStorage.setItem(getNotifShownKey(), JSON.stringify([...set]));
}

function showToast(title, text) {
  const container = document.getElementById("toast-container");
  if (!container) return;
  const el = document.createElement("div");
  el.className = "toast";
  el.innerHTML = `
    <span class="toast-icon">🔔</span>
    <div class="toast-body">
      <div class="toast-title"></div>
      <div class="toast-text"></div>
    </div>
    <button class="toast-close" aria-label="Fermer">✕</button>`;
  el.querySelector(".toast-title").textContent = title;
  el.querySelector(".toast-text").textContent  = text;
  el.querySelector(".toast-close").addEventListener("click", () => removeToast(el));
  container.appendChild(el);
  setTimeout(() => removeToast(el), 8000);
}
function removeToast(el) {
  if (!el || !el.isConnected) return;
  el.classList.add("fade-out");
  setTimeout(() => el.remove(), 300);
}

function sendBrowserNotif(title, body) {
  if (!("Notification" in window)) return;
  if (Notification.permission !== "granted") return;
  try { new Notification(title, { body, tag: title.slice(0,20) }); }
  catch(e) { /* ignore */ }
}

async function checkUpcomingRaces() {
  if (!N.on) return;
  const fav = getFavNation();
  if (!fav) return;
  if (!S.races || !S.races.length) return;

  const codes = (S.entriesLoaded && S.entries.length)
    ? nationCodesFromEntries(fav)
    : [fav];

  N.shownToday = loadShownToday();
  const now = Date.now();
  for (const race of S.races) {
    const rid = String(race.id);
    if (N.shownToday.has(rid)) continue;
    if (!race.DateString) continue;
    const t = new Date(race.DateString).getTime();
    if (isNaN(t)) continue;
    const sec = (t - now) / 1000;
    if (sec <= 0 || sec > 300) continue;

    const inRace = raceMatchesNationCodes(race, codes);
    if (!inRace) continue;

    notifyRace(race, fav);
    N.shownToday.add(rid);
  }
  saveShownToday(N.shownToday);
}

function notifyRace(race, nation) {
  const className = race.event?.boatClass?.DisplayName || "";
  const phase     = race.racePhase?.DisplayName || "";
  const time      = fmtTime(race.DateString);
  const title = t("notif_title", { nation });
  const body  = [race.DisplayName, className, phase, time].filter(Boolean).join(" · ");
  showToast(title, body);
  sendBrowserNotif(title, body);
}

function startNotificationLoop() {
  if (N.intervalId) clearInterval(N.intervalId);
  N.shownToday = loadShownToday();
  setTimeout(checkUpcomingRaces, 1500);
  N.intervalId = setInterval(checkUpcomingRaces, 30000);
}
function stopNotificationLoop() {
  if (N.intervalId) { clearInterval(N.intervalId); N.intervalId = null; }
}

function updateRefreshStatus() {
  const lbl = document.getElementById("refresh-label");
  if (!R.lastRefreshAt) { lbl.textContent = "—"; return; }
  lbl.textContent = fmtRelative(R.lastRefreshAt);
}

function initHeaderState() {
  // Auto-refresh toujours actif (V2 : plus de toggle)
  startAutoRefresh();
  updateRefreshStatus();

  if (localStorage.getItem("wr-notif-enabled") === "on"
      && "Notification" in window
      && Notification.permission === "granted") {
    N.on = true;
    document.getElementById("btn-notif").classList.add("on");
    startNotificationLoop();
  }
}

document.getElementById("btn-search").addEventListener("click", search);
initTheme();
applyStaticI18n();
document.getElementById("lang-icon").textContent = getLang().toUpperCase();
initHeaderState();

// Auto-search au chargement
function autoSearchOnLoad() {
  const saved = loadSelectedComp();
  if (saved) {
    const yearSel = document.getElementById("sel-year");
    const catSel  = document.getElementById("sel-category");
    if ([...yearSel.options].some(o => o.value === saved.year))    yearSel.value = saved.year;
    if ([...catSel.options].some(o => o.value === saved.category)) catSel.value = saved.category;
  }
  search();
}
autoSearchOnLoad();
</script>
